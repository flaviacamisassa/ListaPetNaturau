<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PetNaturau — Lista de Produção</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --green: #1D9E75;
  --green-light: #E1F5EE;
  --green-dark: #0F6E56;
  --red: #C0392B;
  --red-light: #FDEDEC;
  --amber: #E67E22;
  --amber-light: #FEF5E7;
  --blue: #2980B9;
  --blue-light: #EBF5FB;
  --bg: #F7F8FA;
  --card: #FFFFFF;
  --border: #E8EAED;
  --border-strong: #CDD0D5;
  --text: #1A1D23;
  --text-2: #5F6368;
  --text-3: #9AA0A6;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 8px rgba(0,0,0,.04);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

/* ── LAYOUT ─────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; position: relative; }
.topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.topbar-logo .dot { width: 32px; height: 32px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.topbar-logo .dot svg { width: 18px; height: 18px; fill: white; }
.topbar-title { font-weight: 600; font-size: 15px; }
.topbar-date { font-size: 11px; color: var(--text-2); font-family: 'DM Mono', monospace; }
.topbar-auth { display: flex; align-items: center; gap: 8px; }
.auth-btn { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); font-size: 12px; cursor: pointer; color: var(--text-2); font-family: 'DM Sans', sans-serif; }
.auth-btn.connected { border-color: var(--green); color: var(--green); background: var(--green-light); }
.auth-btn svg { width: 14px; height: 14px; }

.content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 100; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 12px; cursor: pointer; border: none; background: none; color: var(--text-3); font-size: 10px; font-family: 'DM Sans', sans-serif; transition: color .15s; }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.active { color: var(--green); }
.nav-btn.active svg { stroke: var(--green); }

/* ── CARDS & COMPONENTS ─────────────────────────────── */
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: 14px; font-weight: 600; }
.card-sub { font-size: 12px; color: var(--text-2); }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; color: var(--text-3); margin: 16px 0 8px; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-weight: 500; transition: all .15s; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--green); color: white; border-color: var(--green); }
.btn-primary:hover { background: var(--green-dark); }
.btn-danger { color: var(--red); border-color: #F5C6C2; }
.btn-danger:hover { background: var(--red-light); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { padding: 6px; border-radius: 8px; }
.btn-full { width: 100%; justify-content: center; }

.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.badge-green { background: var(--green-light); color: var(--green-dark); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-gray { background: #F1F3F4; color: var(--text-2); }

label { font-size: 13px; color: var(--text-2); display: block; margin-bottom: 5px; font-weight: 500; }
input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); outline: none; transition: border-color .15s; }
input:focus, select:focus, textarea:focus { border-color: var(--green); background: white; }
.field { margin-bottom: 12px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

/* ── RECIPE GRID ─────────────────────────────────────── */
.recipe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.recipe-card { border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; background: var(--card); transition: all .15s; position: relative; }
.recipe-card:active { transform: scale(.97); }
.recipe-card.selected { border-color: var(--green); background: var(--green-light); }
.recipe-card.selected-barf { border-color: var(--red); background: var(--red-light); }
.recipe-card .rc-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; line-height: 1.3; }
.recipe-card .rc-sub { font-size: 11px; color: var(--text-2); margin-bottom: 6px; }
.recipe-card .rc-check { position: absolute; top: 8px; right: 8px; width: 18px; height: 18px; border-radius: 50%; background: var(--green); display: none; align-items: center; justify-content: center; }
.recipe-card.selected .rc-check, .recipe-card.selected-barf .rc-check { display: flex; }
.recipe-card.selected-barf .rc-check { background: var(--red); }
.rc-check svg { width: 11px; height: 11px; stroke: white; fill: none; }

/* ── PACKET SECTION ─────────────────────────────────── */
.pkt-section { background: #F7F8FA; border-radius: var(--radius); padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.pkt-name { font-size: 13px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.pkt-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.pkt-col-label { font-size: 11px; font-weight: 600; color: var(--text-2); text-align: center; margin-bottom: 6px; }
.pkt-stepper { display: flex; align-items: center; gap: 6px; justify-content: center; }
.pkt-stepper button { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: white; font-size: 18px; line-height: 1; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text); }
.pkt-stepper button:active { background: var(--green-light); }
.pkt-stepper input { width: 50px; text-align: center; font-size: 16px; font-weight: 600; border-radius: 8px; padding: 5px; }
.pkt-sub { font-size: 11px; color: var(--blue); text-align: center; margin-top: 4px; min-height: 16px; }
.custom-box { border: 1.5px dashed var(--blue); border-radius: var(--radius-sm); padding: 10px; background: white; }
.custom-box-title { font-size: 11px; font-weight: 600; color: var(--blue); margin-bottom: 8px; }
.custom-entry { display: flex; align-items: center; gap: 6px; background: var(--blue-light); border-radius: 6px; padding: 5px 8px; margin-bottom: 6px; font-size: 12px; }
.custom-entry .ce-name { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.custom-entry .ce-detail { color: var(--blue); white-space: nowrap; }
.custom-entry button { background: none; border: none; color: var(--red); font-size: 16px; cursor: pointer; padding: 0 2px; }
.custom-add-form input { margin-bottom: 6px; font-size: 12px; }
.custom-add-btn { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid var(--blue); background: var(--blue-light); color: var(--blue); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.pkt-total-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; }
.pkt-total-val { font-weight: 700; color: var(--green); font-size: 14px; }

/* ── LIST ITEMS ─────────────────────────────────────── */
.list-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.list-item:last-child { border-bottom: none; }
.li-name { font-size: 13px; font-weight: 600; }
.li-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
.li-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

/* ── HISTORY ─────────────────────────────────────────── */
.history-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--card); border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; transition: all .15s; }
.history-item:active { transform: scale(.98); }
.hi-date { font-size: 13px; font-weight: 600; }
.hi-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
.hi-kg { font-weight: 700; color: var(--green); font-family: 'DM Mono', monospace; font-size: 13px; }

/* ── STATS BAR ──────────────────────────────────────── */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.stat-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 10px; text-align: center; }
.stat-val { font-size: 22px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; }
.stat-lbl { font-size: 10px; color: var(--text-3); margin-top: 2px; text-transform: uppercase; letter-spacing: .4px; }

/* ── EMPTY STATE ─────────────────────────────────────── */
.empty { text-align: center; padding: 32px 16px; color: var(--text-3); }
.empty svg { width: 40px; height: 40px; margin-bottom: 10px; opacity: .4; }
.empty p { font-size: 13px; }

/* ── MODAL ───────────────────────────────────────────── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--card); border-radius: 20px 20px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }

/* ── TOAST ───────────────────────────────────────────── */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1A1D23; color: white; padding: 10px 18px; border-radius: 20px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* ── INGREDIENT ROW ─────────────────────────────────── */
.ing-row { display: grid; grid-template-columns: 2fr 80px 100px 32px; gap: 6px; align-items: center; margin-bottom: 6px; }
.ing-row input { font-size: 12px; padding: 6px 8px; }
.ing-row select { font-size: 12px; padding: 6px 8px; }

/* ── SUMMARY ─────────────────────────────────────────── */
.summary-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
.summary-item:last-child { border-bottom: none; }

/* ── PRINT / PDF ─────────────────────────────────────── */
@media print { body { font-size: 11px; } .bottom-nav, .topbar, .no-print { display: none !important; } }

/* ── TABS ────────────────────────────────────────────── */
.tabs { display: flex; background: var(--bg); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 14px; }
.tab-btn { flex: 1; padding: 7px; text-align: center; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-2); font-family: 'DM Sans', sans-serif; }
.tab-btn.active { background: white; color: var(--text); box-shadow: var(--shadow); }

/* ── INGREDIENT TABLE (report) ─────────────────────── */
.mp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.mp-table th { text-align: left; padding: 6px 8px; font-size: 11px; color: var(--text-2); border-bottom: 1px solid var(--border); background: var(--bg); font-weight: 600; }
.mp-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.mp-table .sec-coz td { background: var(--green-light); color: var(--green-dark); font-size: 11px; font-weight: 600; }
.mp-table .sec-cru td { background: var(--red-light); color: var(--red); font-size: 11px; font-weight: 600; }
.mp-table .row-cru td { background: #FFF8F8; }
.mp-table .row-total td { font-weight: 700; background: var(--green-light); color: var(--green-dark); }
</style>
</head>

const catBadge = c => ({Frango:'badge-green',Boi:'badge-amber',Pato:'badge-gray',Porco:'badge-gray',Peru:'badge-gray',Peixe:'badge-blue',Misto:'badge-gray'}[c]||'badge-gray');
const embStr = r => (r.pkts&&r.pktG) ? `${r.pkts} pacotes de ${r.pktG}g` : '';
const recName = r => r.type==='comercial' ? r.name : `${r.tutor} — ${r.dog}`;

function totalGofSel(s) {
  if (!s) return 0;
  return (s.p200||0)*200 + (s.p500||0)*500 + (s.customs||[]).reduce((a,c)=>a+c.qty*c.g,0)
       + (s.qty||0)*(s.recipe?.pktG||0);
}

function toast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.add('hidden');
}

function uid() { return 'r' + Date.now() + Math.random().toString(36).slice(2,6); }

// GOOGLE DRIVE AUTH
// ═══════════════════════════════════════════════════════
function handleAuth() {
  if (state.driveToken) { disconnectDrive(); return; }
  if (CLIENT_ID === 'SEU_GOOGLE_CLIENT_ID_AQUI') {
    openModal(`<div class="modal-title">Conectar ao Google Drive</div>
      <p style="font-size:13px;color:var(--text-2);margin-bottom:16px">Para usar o Google Drive, você precisa configurar um Client ID do Google OAuth 2.0.</p>
      <div style="background:var(--bg);border-radius:8px;padding:12px;font-size:12px;color:var(--text-2);margin-bottom:16px">
        <strong>Passos:</strong><br>
        1. Acesse <a href="https://console.cloud.google.com" target="_blank" style="color:var(--green)">console.cloud.google.com</a><br>
        2. Crie um projeto → APIs & Services → Credentials<br>
        3. Crie um OAuth 2.0 Client ID (tipo: Web application)<br>
        4. Adicione a URL deste app em "Authorized JavaScript origins"<br>
        5. Substitua <code>SEU_GOOGLE_CLIENT_ID_AQUI</code> no código pelo Client ID gerado
      </div>
      <div style="background:var(--amber-light);border-radius:8px;padding:10px;font-size:12px;color:var(--amber);margin-bottom:16px">
        ℹ️ Enquanto isso, o app funciona normalmente com dados salvos localmente no dispositivo.
      </div>
      <button class="btn btn-full" onclick="useLocalStorage(); closeModal()">Usar armazenamento local</button>`);
    return;
  }
  const params = new URLSearchParams({
    client_id: CLIENT_ID, redirect_uri: location.origin + location.pathname,
    response_type: 'token', scope: SCOPES, prompt: 'select_account'
  });
  location.href = 'https://accounts.google.com/o/oauth2/auth?' + params;
}

function useLocalStorage() {
  state.driveToken = 'local';
  document.getElementById('auth-btn').className = 'auth-btn connected';
  document.getElementById('auth-label').textContent = 'Local';
  loadData();
}

function disconnectDrive() {
  state.driveToken = null; state.driveFileId = null;
  document.getElementById('auth-btn').className = 'auth-btn';
  document.getElementById('auth-label').textContent = 'Conectar Drive';
  toast('Desconectado');
}

function checkAuthCallback() {
  const hash = location.hash;
  if (!hash.includes('access_token')) return;
  const p = new URLSearchParams(hash.slice(1));
  state.driveToken = p.get('access_token');
  history.replaceState(null, '', location.pathname);
  document.getElementById('auth-btn').className = 'auth-btn connected';
  document.getElementById('auth-label').textContent = 'Drive ✓';
  loadData();
}

// ═══════════════════════════════════════════════════════
// DATA PERSISTENCE
// ═══════════════════════════════════════════════════════
async function loadData() {
  if (state.driveToken === 'local') {
    const raw = localStorage.getItem('petnaturau-db');
    state.db = raw ? JSON.parse(raw) : defaultDB();
    render(); return;
  }
  try {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}'&spaces=drive`, {headers:{Authorization:`Bearer ${state.driveToken}`}});
    const data = await res.json();
    if (data.files && data.files.length > 0) {
      state.driveFileId = data.files[0].id;
      const r2 = await fetch(`https://www.googleapis.com/drive/v3/files/${state.driveFileId}?alt=media`, {headers:{Authorization:`Bearer ${state.driveToken}`}});
      state.db = await r2.json();
    } else {
      state.db = defaultDB();
      await saveData();
    }
  } catch(e) { state.db = defaultDB(); toast('Erro ao carregar dados'); }
  render();
}

async function saveData() {
  if (!state.driveToken || !state.db) return;
  const body = JSON.stringify(state.db, null, 2);
  if (state.driveToken === 'local') {
    localStorage.setItem('petnaturau-db', body); return;
  }
  try {
    if (state.driveFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${state.driveFileId}?uploadType=media`, {method:'PATCH',headers:{Authorization:`Bearer ${state.driveToken}`,'Content-Type':'application/json'},body});
    } else {
      const meta = await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:`Bearer ${state.driveToken}`,'Content-Type':'application/json'},body:JSON.stringify({name:FILE_NAME,mimeType:'application/json'})});
      const mj = await meta.json(); state.driveFileId = mj.id;
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${state.driveFileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:`Bearer ${state.driveToken}`,'Content-Type':'application/json'},body});
    }
    toast('💾 Salvo no Drive');
  } catch(e) { toast('Erro ao salvar'); }
}

// PÁGINA PRODUÇÃO

function renderProducao() {
  const db = state.db;
  const today = state.today;
  const selectedIds = Object.keys(today.selected);
  const totalG = selectedIds.reduce((a,id) => a + totalGofSel(today.selected[id]), 0);

  const comerciais = db.recipes.filter(r => r.type === 'comercial');
  const personalizadas = db.recipes.filter(r => r.type === 'personalizada');
  const tutors = [...new Set(personalizadas.map(r => r.tutor))];

  let html = `<div class="section-label">Selecione as receitas do dia</div>`;

  // TABS cozida/barf/personalizada
  html += `<div class="tabs">
    <button class="tab-btn ${state.prodTab!=='barf'&&state.prodTab!=='personal'?'active':''}" onclick="setProdTab('cozida')">🔥 Cozidas</button>
    <button class="tab-btn ${state.prodTab==='barf'?'active':''}" onclick="setProdTab('barf')">🥩 BARF</button>
    <button class="tab-btn ${state.prodTab==='personal'?'active':''}" onclick="setProdTab('personal')">👤 Personal.</button>
  </div>`;

  const tab = state.prodTab || 'cozida';

  if (tab === 'cozida') {
    const coz = comerciais.filter(r => !r.barf);
    html += `<div class="recipe-grid">` + coz.map(r => {
      const sel = today.selected[r.id];
      return `<div class="recipe-card ${sel?'selected':''}" onclick="toggleRecipe('${r.id}')">
        <div class="rc-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="rc-name">Dieta ${r.name.replace('Dieta Comercial ','')}</div>
        <div class="rc-sub">${r.subname}</div>
        <span class="badge ${catBadge(r.cat)}" style="font-size:10px">${r.cat}</span>
      </div>`;
    }).join('') + `</div>`;
  } else if (tab === 'barf') {
    const barf = comerciais.filter(r => r.barf);
    html += `<div class="recipe-grid">` + barf.map(r => {
      const sel = today.selected[r.id];
      return `<div class="recipe-card ${sel?'selected-barf':''}" onclick="toggleRecipe('${r.id}')">
        <div class="rc-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="rc-name">${r.name}</div>
        <div class="rc-sub">${r.subname}</div>
        <span class="badge badge-red" style="font-size:10px">BARF</span>
      </div>`;
    }).join('') + `</div>`;
  } else {
    html += tutors.map(tutor => {
      const pets = personalizadas.filter(r => r.tutor === tutor);
      return `<div class="section-label">${tutor}</div>
        <div class="recipe-grid">` + pets.map(r => {
          const sel = today.selected[r.id];
          return `<div class="recipe-card ${sel?'selected':''}" onclick="toggleRecipe('${r.id}')">
            <div class="rc-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div class="rc-name">${r.dog}</div>
            <div class="rc-sub">${r.tutor}</div>
            <span class="badge ${catBadge(r.cat)}" style="font-size:10px">${r.cat}</span>
            ${embStr(r)?`<div style="font-size:10px;color:var(--blue);margin-top:4px">📦 ${embStr(r)}</div>`:''}
          </div>`;
        }).join('') + `</div>`;
    }).join('');
  }

  // PACOTES das receitas selecionadas
  if (selectedIds.length > 0) {
    html += `<div class="section-label">Configure os pacotes</div>`;
    selectedIds.forEach(id => {
      const r = db.recipes.find(x => x.id === id);
      if (!r) return;
      const s = today.selected[id];
      const subtG = totalGofSel(s);

      if (r.type === 'comercial') {
        html += `<div class="pkt-section">
          <div class="pkt-name">
            ${r.name.replace('Dieta Comercial ','')}
            <span class="badge ${r.barf?'badge-red':catBadge(r.cat)}" style="font-size:10px">${r.barf?'BARF':r.cat}</span>
          </div>
          <div class="pkt-cols">
            <div>
              <div class="pkt-col-label">Pacotes 200g</div>
              <div class="pkt-stepper">
                <button onclick="adjPkt('${id}','p200',-1)">−</button>
                <input type="number" min="0" value="${s.p200||0}" oninput="setPkt('${id}','p200',this.value)">
                <button onclick="adjPkt('${id}','p200',1)">+</button>
              </div>
              <div class="pkt-sub">${(s.p200||0)>0?(s.p200)+'×200g = '+((s.p200*200)/1000).toFixed(2)+'kg':''}</div>
            </div>
            <div>
              <div class="pkt-col-label">Pacotes 500g</div>
              <div class="pkt-stepper">
                <button onclick="adjPkt('${id}','p500',-1)">−</button>
                <input type="number" min="0" value="${s.p500||0}" oninput="setPkt('${id}','p500',this.value)">
                <button onclick="adjPkt('${id}','p500',1)">+</button>
              </div>
              <div class="pkt-sub">${(s.p500||0)>0?(s.p500)+'×500g = '+((s.p500*500)/1000).toFixed(2)+'kg':''}</div>
            </div>
          </div>
          <div class="custom-box">
            <div class="custom-box-title">📦 Pacote personalizado</div>
            ${(s.customs||[]).map((c,i)=>`<div class="custom-entry">
              <span class="ce-name">${c.name}</span>
              <span class="ce-detail">${c.qty}×${c.g}g</span>
              <button onclick="removeCustom('${id}',${i})">×</button>
            </div>`).join('')}
            <div class="custom-add-form">
              <input type="text" placeholder="Nome do cliente" id="cn-${id}">
              <div class="row2">
                <input type="number" placeholder="g/pacote" id="cg-${id}" min="1">
                <input type="number" placeholder="qtd" id="cq-${id}" min="1" value="1">
              </div>
              <button class="custom-add-btn" onclick="addCustom('${id}')">+ Adicionar cliente</button>
            </div>
          </div>
          <div class="pkt-total-bar">
            <span style="font-size:12px;color:var(--text-2)">Total esta receita</span>
            <span class="pkt-total-val">${subtG>0?(subtG/1000).toFixed(2)+' kg':'—'}</span>
          </div>
        </div>`;
      } else {
        // PERSONALIZADA
        const emb = embStr(r);
        html += `<div class="pkt-section">
          <div class="pkt-name">${r.tutor} — ${r.dog} <span class="badge ${catBadge(r.cat)}" style="font-size:10px">${r.cat}</span></div>
          ${emb?`<div style="font-size:12px;color:var(--blue);margin-bottom:10px">📦 ${emb}</div>`:''}
          <div class="field">
            <label>Unidades a produzir</label>
            <div class="pkt-stepper" style="justify-content:flex-start;gap:8px">
              <button onclick="adjPer('${id}',-1)">−</button>
              <input type="number" min="1" value="${s.qty||r.defQty}" oninput="setPer('${id}',this.value)" style="width:70px">
              <button onclick="adjPer('${id}',1)">+</button>
              <span style="font-size:12px;color:var(--text-2);margin-left:4px">padrão: ${r.defQty}</span>
            </div>
          </div>
          <div class="pkt-total-bar">
            <span style="font-size:12px;color:var(--text-2)">Total</span>
            <span class="pkt-total-val">${subtG>0?(subtG/1000).toFixed(2)+' kg':'—'}</span>
          </div>
        </div>`;
      }
    });
  }

  // BOTÃO GERAR
  if (totalG > 0) {
    html += `<div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary btn-full" onclick="gerarRelatorio()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Gerar Relatório PDF (${(totalG/1000).toFixed(2)} kg)
      </button>
    </div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function setProdTab(t) { state.prodTab = t; renderProducao(); }

function toggleRecipe(id) {
  const r = state.db.recipes.find(x => x.id === id);
  if (!r) return;
  if (state.today.selected[id]) {
    delete state.today.selected[id];
  } else {
    if (r.type === 'comercial') {
      state.today.selected[id] = { recipe: r, p200: 0, p500: 0, customs: [] };
    } else {
      state.today.selected[id] = { recipe: r, qty: r.defQty };
    }
  }
  renderProducao();
}

function adjPkt(id, field, delta) {
  if (!state.today.selected[id]) return;
  state.today.selected[id][field] = Math.max(0, (state.today.selected[id][field]||0) + delta);
  renderProducao();
}
function setPkt(id, field, val) {
  if (!state.today.selected[id]) return;
  state.today.selected[id][field] = Math.max(0, parseInt(val)||0);
}
function adjPer(id, delta) {
  if (!state.today.selected[id]) return;
  const r = state.today.selected[id].recipe;
  state.today.selected[id].qty = Math.max(1, (state.today.selected[id].qty||r.defQty) + delta);
  renderProducao();
}
function setPer(id, val) {
  if (!state.today.selected[id]) return;
  state.today.selected[id].qty = Math.max(1, parseInt(val)||1);
}
function addCustom(id) {
  const name = document.getElementById('cn-'+id)?.value.trim();
  const g = parseInt(document.getElementById('cg-'+id)?.value)||0;
  const qty = parseInt(document.getElementById('cq-'+id)?.value)||1;
  if (!name||!g) { toast('Informe nome e gramas'); return; }
  state.today.selected[id].customs.push({name,g,qty});
  renderProducao();
}
function removeCustom(id, idx) {
  state.today.selected[id].customs.splice(idx,1);
  renderProducao();
}

// ═══════════════════════════════════════════════════════
// GERAR RELATÓRIO PDF
// ═══════════════════════════════════════════════════════
function computeMP(selected) {
  const mp = {};
  Object.values(selected).forEach(s => {
    const r = s.recipe; if (!r) return;
    let kg;
    if (r.type === 'comercial') {
      const totalG = (s.p200||0)*200 + (s.p500||0)*500 + (s.customs||[]).reduce((a,c)=>a+c.qty*c.g,0);
      kg = totalG / 1000;
    } else {
      kg = (s.qty||r.defQty) * (r.pktG||0) / 1000;
    }
    if (!kg) return;
    r.ingredients.forEach(ing => {
      const raw = ing.raw||false;
      const k = ing.n.toLowerCase() + '__' + (raw?'cru':'coz');
      if (!mp[k]) mp[k] = {name:ing.n, total:0, raw};
      mp[k].total += ing.q * kg;
    });
  });
  return Object.values(mp).sort((a,b) => a.raw!==b.raw ? (a.raw?1:-1) : a.name.localeCompare(b.name,'pt'));
}

function gerarRelatorio() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const sel = state.today.selected;
  const mp = computeMP(sel);
  const totalMP = mp.reduce((a,x)=>a+x.total,0);
  const dateStr = new Date().toLocaleDateString('pt-BR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const dateShort = new Date().toLocaleDateString('pt-BR');

  let y = 15;
  const L = 14, R = 196, W = 182;

  // ── HEADER
  doc.setFillColor(29,158,117);
  doc.rect(0,0,210,28,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('PetNaturau — Lista de Produção', L, 12);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(dateStr, L, 19);
  doc.text(`Data fabricação: _____ / _____ / _______`, L, 25);
  doc.text(`Lote PetNaturau: ___________________`, 120, 25);
  doc.setTextColor(30,30,30);
  y = 36;

  // ── PEDIDOS DO DIA
  doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.setFillColor(29,158,117);
  doc.rect(L,y,W,7,'F');
  doc.setTextColor(255,255,255);
  doc.text('PEDIDOS DO DIA', L+2, y+5);
  doc.setTextColor(30,30,30);
  y += 10;

  const pedRows = [];
  Object.values(sel).forEach(s => {
    const r = s.recipe; if (!r) return;
    if (r.type === 'comercial') {
      const totalG = (s.p200||0)*200 + (s.p500||0)*500 + (s.customs||[]).reduce((a,c)=>a+c.qty*c.g,0);
      if (!totalG) return;
      const padrao = [];
      if ((s.p200||0)>0) padrao.push(`${s.p200}×200g`);
      if ((s.p500||0)>0) padrao.push(`${s.p500}×500g`);
      const custom = (s.customs||[]).map(c=>`${c.qty}×${c.g}g (${c.name})`).join(', ');
      pedRows.push([r.name+(r.barf?' [BARF]':''), padrao.join(' + ')||'—', custom||'—', (totalG/1000).toFixed(2)+' kg']);
    } else {
      const qty = s.qty||r.defQty;
      const totalG = qty * (r.pktG||0);
      pedRows.push([`${r.tutor} — ${r.dog}`, embStr(r)||`${qty} unid`, '—', totalG>0?(totalG/1000).toFixed(2)+' kg':`${qty} unid`]);
    }
  });

  doc.autoTable({startY:y, head:[['Receita','Pacotes padrão','Personalizado','Total']], body:pedRows,
    styles:{fontSize:9,cellPadding:3}, headStyles:{fillColor:[29,158,117],textColor:255,fontStyle:'bold'},
    columnStyles:{0:{cellWidth:58},1:{cellWidth:40},2:{cellWidth:55},3:{cellWidth:29,halign:'right',fontStyle:'bold'}}, margin:{left:L,right:14}});
  y = doc.lastAutoTable.finalY + 8;

  // ── INGREDIENTES POR RECEITA
  doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.setFillColor(29,158,117);
  doc.rect(L,y,W,7,'F');
  doc.setTextColor(255,255,255);
  doc.text('INGREDIENTES POR RECEITA', L+2, y+5);
  doc.setTextColor(30,30,30);
  y += 10;

  Object.values(sel).forEach(s => {
    const r = s.recipe; if (!r) return;
    let kg;
    if (r.type === 'comercial') {
      const totalG = (s.p200||0)*200+(s.p500||0)*500+(s.customs||[]).reduce((a,c)=>a+c.qty*c.g,0);
      if (!totalG) return;
      kg = totalG/1000;
    } else {
      kg = (s.qty||r.defQty)*(r.pktG||0)/1000;
      if (!kg) return;
    }
    const ingRows = r.ingredients.sort((a,b)=>a.n.localeCompare(b.n,'pt')).map(ing => {
      const tot = ing.q * kg;
      return [ing.n+(ing.raw?' 🥩':''), tot>=1000?(tot/1000).toFixed(3)+' kg':Math.round(tot)+' g'];
    });
    if (y > 250) { doc.addPage(); y = 15; }
    doc.autoTable({startY:y,
      head:[[{content:`${recName(r)} — ${kg.toFixed(2)} kg`, colSpan:2, styles:{fillColor:[240,250,246],textColor:[15,110,86],fontStyle:'bold',fontSize:9}}]],
      body:ingRows, styles:{fontSize:8,cellPadding:2},
      columnStyles:{0:{cellWidth:120},1:{cellWidth:62,halign:'right'}}, margin:{left:L,right:14}});
    y = doc.lastAutoTable.finalY + 5;
  });

  // ── TOTAL MATÉRIA-PRIMA
  if (y > 220) { doc.addPage(); y = 15; }
  doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.setFillColor(29,158,117);
  doc.rect(L,y,W,7,'F');
  doc.setTextColor(255,255,255);
  doc.text('TOTAL DE MATÉRIA-PRIMA', L+2, y+5);
  doc.setTextColor(30,30,30);
  y += 10;

  const mpRows = [];
  let lastRaw = null;
  mp.forEach(e => {
    if (e.raw !== lastRaw) {
      mpRows.push([{content: e.raw?'🥩 CRUS — separar do fluxo de cozimento':'🔥 COZIDOS — pré-preparo sexta-feira',
        colSpan:7, styles:{fillColor: e.raw?[252,235,235]:[225,245,238], textColor: e.raw?[160,45,45]:[15,110,86], fontStyle:'bold', fontSize:9}}]);
      lastRaw = e.raw;
    }
    mpRows.push([e.name, e.raw?'Cru':'Cozido', Math.round(e.total)+' g', (e.total/1000).toFixed(3)+' kg', '', '', e.raw?'—':'']);
  });
  mpRows.push([{content:'TOTAL GERAL',colSpan:2,styles:{fontStyle:'bold',fillColor:[225,245,238],textColor:[15,110,86]}},
    {content:Math.round(totalMP)+' g',styles:{fontStyle:'bold',fillColor:[225,245,238],textColor:[15,110,86]}},
    {content:(totalMP/1000).toFixed(3)+' kg',styles:{fontStyle:'bold',fillColor:[225,245,238],textColor:[15,110,86]}},
    {content:'',colSpan:3,styles:{fillColor:[225,245,238]}}]);

  doc.autoTable({startY:y, head:[['Ingrediente','Preparo','Total (g)','Total (kg)','Marca','Lote Fornecedor','Temp °C']],
    body:mpRows, styles:{fontSize:8,cellPadding:3},
    headStyles:{fillColor:[29,158,117],textColor:255,fontStyle:'bold'},
    columnStyles:{0:{cellWidth:45},1:{cellWidth:18},2:{cellWidth:22},3:{cellWidth:22},4:{cellWidth:30},5:{cellWidth:30},6:{cellWidth:15}},
    margin:{left:L,right:14}});
  y = doc.lastAutoTable.finalY + 12;

  // ── ASSINATURAS
  if (y > 250) { doc.addPage(); y = 15; }
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('Data de fabricação: _____ / _____ / _______', L, y);
  doc.text('Data: _____ / _____ / _______', 130, y); y += 12;
  doc.line(L, y, L+75, y);
  doc.line(130, y, R, y); y += 5;
  doc.setFontSize(8);
  doc.text('Responsável pelo preenchimento', L, y);
  doc.text('Validação do responsável técnico', 130, y);

  // SALVAR NO HISTÓRICO
  const histEntry = {
    id: 'h'+Date.now(), date: todayStr(), dateStr: dateStr,
    recipes: Object.values(sel).map(s=>recName(s.recipe)).filter(Boolean),
    totalKg: (totalMP/1000).toFixed(2),
    selected: JSON.parse(JSON.stringify(sel))
  };
  if (!state.db.history) state.db.history = [];
  state.db.history.unshift(histEntry);
  if (state.db.history.length > 60) state.db.history = state.db.history.slice(0,60);
  saveData();

  doc.save(`petnaturau-producao-${dateShort.replace(/\//g,'-')}.pdf`);
  toast('📄 PDF gerado e salvo no histórico!', 3000);

  // limpa o dia
  state.today = { selected: {}, date: todayStr() };
  renderProducao();
}

// ═══════════════════════════════════════════════════════
// PÁGINA RECEITAS
// ═══════════════════════════════════════════════════════
function renderReceitas() {
  const tab = state.recipeTab || 'comercial';
  const coz = state.db.recipes.filter(r=>r.type==='comercial'&&!r.barf);
  const barf = state.db.recipes.filter(r=>r.type==='comercial'&&r.barf);
  const pers = state.db.recipes.filter(r=>r.type==='personalizada');

  let html = `<div class="tabs">
    <button class="tab-btn ${tab==='comercial'?'active':''}" onclick="setRecTab('comercial')">Comerciais</button>
    <button class="tab-btn ${tab==='barf'?'active':''}" onclick="setRecTab('barf')">BARF</button>
    <button class="tab-btn ${tab==='pessoal'?'active':''}" onclick="setRecTab('pessoal')">Personal.</button>
  </div>`;

  const renderRecipeItem = r => {
    const emb = embStr(r);
    const cruC = r.ingredients.filter(i=>i.raw).length;
    return `<div class="list-item">
      <div style="flex:1">
        <div class="li-name">${recName(r)} ${r.barf?'<span class="badge badge-red" style="font-size:10px">BARF</span>':''} ${cruC>0&&!r.barf?`<span class="badge badge-red" style="font-size:10px">${cruC} cru${cruC>1?'s':''}</span>`:''}</div>
        <div class="li-meta">${r.ingredients.length} ing · ${r.type==='comercial'?'por kg':`${r.defQty} unid`} · ${r.temp?r.temp+'°C':'sem coz.'}</div>
        ${emb?`<div style="font-size:11px;color:var(--blue);margin-top:3px">📦 ${emb}</div>`:''}
      </div>
      <div class="li-right">
        <span class="badge ${catBadge(r.cat)}" style="font-size:10px">${r.cat}</span>
        <button class="btn btn-icon btn-sm" onclick="editRecipe('${r.id}')">✏️</button>
        <button class="btn btn-icon btn-sm btn-danger" onclick="deleteRecipe('${r.id}')">🗑</button>
      </div>
    </div>`;
  };

  if (tab === 'comercial') {
    html += `<div class="card"><div class="card-header"><span class="card-title">🔥 Dietas Cozidas (${coz.length})</span>
      <button class="btn btn-primary btn-sm" onclick="newRecipe('comercial')">+ Nova</button></div>
      ${coz.length ? coz.map(renderRecipeItem).join('') : '<div class="empty"><p>Nenhuma receita comercial</p></div>'}
    </div>`;
  } else if (tab === 'barf') {
    html += `<div class="card"><div class="card-header"><span class="card-title">🥩 BARF — Cruas (${barf.length})</span>
      <button class="btn btn-primary btn-sm" onclick="newRecipe('barf')">+ Nova</button></div>
      ${barf.length ? barf.map(renderRecipeItem).join('') : '<div class="empty"><p>Nenhuma receita BARF</p></div>'}
    </div>`;
  } else {
    const tutors = [...new Set(pers.map(r=>r.tutor))];
    html += `<div style="display:flex;justify-content:flex-end;margin-bottom:8px">
      <button class="btn btn-primary btn-sm" onclick="newRecipe('personalizada')">+ Nova personalizada</button></div>`;
    tutors.forEach(tutor => {
      const pets = pers.filter(r=>r.tutor===tutor);
      html += `<div class="card"><div class="card-header"><span class="card-title">${tutor} <span class="badge badge-gray">${pets.length}</span></span></div>
        ${pets.map(renderRecipeItem).join('')}</div>`;
    });
    if (!pers.length) html += `<div class="card"><div class="empty"><p>Nenhuma dieta personalizada</p></div></div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function setRecTab(t) { state.recipeTab = t; renderReceitas(); }

function newRecipe(type) {
  const isCom = type==='comercial'||type==='barf';
  openModal(`<div class="modal-title">Nova Receita<button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="field"><label>Nome</label><input type="text" id="nr-name" placeholder="${isCom?'Ex: Dieta Comercial Frango':'Ex: Flor'}"></div>
    ${isCom?`<div class="field"><label>Sub-nome / apelido</label><input type="text" id="nr-sub" placeholder="Ex: Risotto de Frango"></div>`
    :`<div class="row2"><div class="field"><label>Tutor/empresa</label><input type="text" id="nr-tutor" value=""></div>
      <div class="field"><label>Cachorro</label><input type="text" id="nr-dog"></div></div>
      <div class="row2">
        <div class="field"><label>Nº pacotes/mês</label><input type="number" id="nr-pkts" value="30"></div>
        <div class="field"><label>Peso/pacote (g)</label><input type="number" id="nr-pktg" step="0.1"></div>
      </div>`}
    <div class="row2">
      <div class="field"><label>Categoria</label>
        <select id="nr-cat"><option>Frango</option><option>Boi</option><option>Pato</option><option>Peixe</option><option>Porco</option><option>Peru</option><option>Misto</option></select>
      </div>
      <div class="field"><label>Temp. °C${type==='barf'?' (vazio=sem coz.)':''}</label><input type="number" id="nr-temp" value="${type==='barf'?'':85}"></div>
    </div>
    <div class="field"><label>${isCom?'Ingredientes por 1 kg':'Ingredientes por unidade (g)'}</label></div>
    <div class="ing-hdr" style="display:grid;grid-template-columns:2fr 80px ${type!=='barf'?'80px ':''}32px;gap:6px;margin-bottom:4px">
      <span style="font-size:11px;color:var(--text-2)">Ingrediente</span>
      <span style="font-size:11px;color:var(--text-2)">g</span>
      ${type==='barf'||type==='comercial'?'':''}
      <span></span>
    </div>
    <div id="nr-ings"></div>
    <button class="btn btn-sm" style="margin-bottom:12px" onclick="addNrIng('${type}')">+ Ingrediente</button>
    <button class="btn btn-primary btn-full" onclick="saveNewRecipe('${type}')">Salvar Receita</button>`);
  // adiciona 3 linhas iniciais
  for(let i=0;i<3;i++) addNrIng(type);
}

function addNrIng(type) {
  const showRaw = (type==='barf');
  const d = document.createElement('div');
  d.className = 'ing-row';
  d.style.gridTemplateColumns = `2fr 80px ${showRaw?'100px ':''} 32px`;
  d.innerHTML = `<input type="text" placeholder="Ingrediente">
    <input type="number" placeholder="g" min="0" step="0.1">
    ${showRaw?`<label style="display:flex;align-items:center;gap:4px;font-size:12px;white-space:nowrap"><input type="checkbox" style="width:auto"> 🥩 Cru</label>`:''}
    <button class="btn btn-icon btn-sm btn-danger" onclick="this.parentElement.remove()" style="padding:4px">✕</button>`;
  document.getElementById('nr-ings').appendChild(d);
}

function saveNewRecipe(type) {
  const name = document.getElementById('nr-name')?.value.trim();
  if (!name) { toast('Informe o nome'); return; }
  const rows = document.querySelectorAll('#nr-ings .ing-row');
  const ingredients = [];
  rows.forEach(r => {
    const inps = r.querySelectorAll('input[type=text],input[type=number]');
    const cb = r.querySelector('input[type=checkbox]');
    const n = inps[0].value.trim(), q = parseFloat(inps[1].value);
    if (n && q > 0) ingredients.push({n, q, raw: cb?cb.checked:false});
  });
  if (!ingredients.length) { toast('Adicione ingredientes'); return; }
  const cat = document.getElementById('nr-cat').value;
  const temp = parseInt(document.getElementById('nr-temp')?.value)||null;
  let recipe;
  if (type==='comercial'||type==='barf') {
    recipe = {id:uid(),type:'comercial',barf:type==='barf',name,subname:document.getElementById('nr-sub')?.value.trim()||'',cat,temp,ingredients};
  } else {
    const tutor = document.getElementById('nr-tutor')?.value.trim();
    const dog = document.getElementById('nr-dog')?.value.trim();
    if (!tutor||!dog) { toast('Informe tutor e cachorro'); return; }
    recipe = {id:uid(),type:'personalizada',tutor,dog,cat,temp,
      defQty:parseInt(document.getElementById('nr-pkts')?.value)||30,
      pkts:parseInt(document.getElementById('nr-pkts')?.value)||null,
      pktG:parseFloat(document.getElementById('nr-pktg')?.value)||null,
      ingredients};
  }
  state.db.recipes.push(recipe);
  saveData();
  closeModal();
  renderReceitas();
  toast('✅ Receita salva!');
}

function editRecipe(id) {
  toast('Em breve: edição completa de receitas'); // simplificado
}

function deleteRecipe(id) {
  if (!confirm('Excluir esta receita?')) return;
  state.db.recipes = state.db.recipes.filter(r=>r.id!==id);
  saveData(); renderReceitas();
  toast('🗑 Receita excluída');
}

// ═══════════════════════════════════════════════════════
// PÁGINA HISTÓRICO
// ═══════════════════════════════════════════════════════
function renderHistorico() {
  const history = (state.db.history||[]);
  let html = `<div class="card-title" style="margin-bottom:12px">Histórico de Produções</div>`;
  if (!history.length) {
    html += `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>Nenhuma produção registrada ainda</p></div>`;
  } else {
    html += history.map(h => `<div class="history-item" onclick="viewHistDetail('${h.id}')">
      <div>
        <div class="hi-date">${h.dateStr||h.date}</div>
        <div class="hi-meta">${(h.recipes||[]).slice(0,3).join(' · ')}${(h.recipes||[]).length>3?` +${h.recipes.length-3}`:''}</div>
      </div>
      <div style="text-align:right">
        <div class="hi-kg">${h.totalKg} kg</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:2px">${(h.recipes||[]).length} receitas</div>
      </div>
    </div>`).join('');
  }
  document.getElementById('content').innerHTML = html;
}

function viewHistDetail(id) {
  const h = (state.db.history||[]).find(x=>x.id===id);
  if (!h) return;
  const mp = computeMP(h.selected||{});
  const totalMP = mp.reduce((a,x)=>a+x.total,0);
  openModal(`<div class="modal-title">${h.dateStr||h.date}<button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val">${(h.recipes||[]).length}</div><div class="stat-lbl">Receitas</div></div>
      <div class="stat-box"><div class="stat-val">${h.totalKg}</div><div class="stat-lbl">kg total</div></div>
      <div class="stat-box"><div class="stat-val">${mp.length}</div><div class="stat-lbl">Ingredientes</div></div>
    </div>
    <div class="section-label">Receitas produzidas</div>
    ${(h.recipes||[]).map(n=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">${n}</div>`).join('')}
    <div class="section-label" style="margin-top:12px">Matéria-prima usada</div>
    ${mp.map(e=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span>${e.name} ${e.raw?'🥩':''}</span>
      <span style="font-weight:600">${(e.total/1000).toFixed(3)} kg</span>
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;padding:8px 0;font-weight:700;font-size:13px;color:var(--green)">
      <span>TOTAL</span><span>${(totalMP/1000).toFixed(3)} kg</span>
    </div>`);
}

    document.getElementById('auth-label').textContent = 'Local ✓';
    state.db = defaultDB();
    render();
  }
}
