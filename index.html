  }).filter(Boolean);

  openModal(`<div class="modal-title">${h.dateStr||h.date} <button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val">${receitasComSabor.length}</div><div class="stat-lbl">Receitas</div></div>
      <div class="stat-box"><div class="stat-val">${h.totalKg}</div><div class="stat-lbl">kg total</div></div>
      <div class="stat-box"><div class="stat-val">${mp.length}</div><div class="stat-lbl">Ingredientes</div></div>
    </div>
    <div class="section-label">Receitas produzidas</div>
    ${receitasComSabor.map(n=>`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;font-weight:600">${n}</div>`).join('')}
    <div class="section-label" style="margin-top:14px">Matéria-prima utilizada</div>
    ${mp.map(e=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span>${e.name}${e.raw?' 🥩':''}</span>
      <span style="font-weight:700;font-family:'DM Mono',monospace">${(e.total/1000).toFixed(3)} kg</span>
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;padding:10px 0;font-weight:700;font-size:14px;color:var(--green-dark);border-top:2px solid var(--green)">
      <span>TOTAL</span><span style="font-family:'DM Mono',monospace">${(totalMP/1000).toFixed(3)} kg</span>
    </div>
    <button class="gen-btn" style="border-radius:10px;width:100%;margin-top:12px" onclick="closeModal();regenarPDFHist('${id}')">
      <i class="fas fa-file-pdf"></i> Ver PDF desta produção
    </button>`);
}

function regenarPDFHist(id){
  const h=(state.db.history||[]).find(x=>x.id===id); if(!h) return;
  // backup do estado atual
  const selBackup=JSON.parse(JSON.stringify(state.today.selected));
  const dateBackup=state.today.date;
  // carrega seleção do histórico com receitas ATUAIS do DB
  const sel=JSON.parse(JSON.stringify(h.selected||{}));
  Object.keys(sel).forEach(rid=>{
    const r=state.db.recipes.find(x=>x.id===rid);
    if(r) sel[rid].recipe=r; // usa sempre a receita atual
    else delete sel[rid];
  });
  state.today.selected=sel;
  state.today.date=h.date;
  // gera PDF sem salvar no histórico
  gerarRelatorioSemSalvar();
  // restaura imediatamente (gerarRelatorioSemSalvar não reseta o estado)
  state.today.selected=selBackup;
  state.today.date=dateBackup;
}

// ── PETISCOS & MASTIGÁVEIS ──────────────────────────────────
const PETISCO_TABS=[
  {key:'petiscos',label:'Petiscos',icon:'fa-drumstick-bite',color:'var(--amber)'},
  {key:'caldos',label:'Caldos',icon:'fa-mug-hot',color:'var(--blue)'},
  {key:'saborizantes',label:'Saborizantes',icon:'fa-tint',color:'var(--green-dark)'},
  {key:'nutrally',label:'Nutrally',icon:'fa-leaf',color:'var(--red)'}
];

function renderPetiscos(){
  if(!state.petiscosTab) state.petiscosTab='petiscos';
  const tab=state.petiscosTab;
  const items=state.db.petiscosItems?.[tab]||[];

  let html=`<div class="tabs">`+PETISCO_TABS.map(t=>
    `<button class="tab-btn ${tab===t.key?'active':''}" onclick="setPetiscosTab('${t.key}')">
      <i class="fas ${t.icon}" style="font-size:11px;margin-right:3px"></i>${t.label}
    </button>`).join('')+`</div>`;

  if(!items.length){
    html+=`<div class="empty"><i class="fas fa-box-open"></i><p>Nenhum item cadastrado em ${PETISCO_TABS.find(t=>t.key===tab).label}</p></div>`;
  } else {
    html+=items.map((item,idx)=>{
      const today=state.petiscosToday?.[tab]?.[idx]||{};
      return `<div class="pkt-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div class="pkt-name" style="margin:0">${item}</div>
          <button class="btn btn-icon btn-sm btn-danger" onclick="deletePetiscoItem('${tab}',${idx})"><i class="fas fa-trash-alt"></i></button>
        </div>
        <div class="row2">
          <div class="field" style="margin-bottom:0">
            <label>Data de produção</label>
            <input type="date" value="${today.date||state.today.date}" onchange="setPetiscoField('${tab}',${idx},'date',this.value)">
          </div>
          <div class="field" style="margin-bottom:0">
            <label>Peso produzido (kg)</label>
            <input type="number" min="0" step="0.01" placeholder="0.00" value="${today.kg||''}" oninput="setPetiscoField('${tab}',${idx},'kg',this.value)">
          </div>
        </div>
        <button class="btn btn-primary btn-full" style="margin-top:10px" onclick="savePetiscoEntry('${tab}',${idx})">
          <i class="fas fa-save"></i> Salvar Produção
        </button>
      </div>`;
    }).join('');
  }

  html+=`<div class="card" style="margin-top:14px">
    <div class="card-header"><span class="card-title">+ Adicionar novo item</span></div>
    <div class="field" style="margin-bottom:10px">
      <input type="text" id="new-petisco-name" placeholder="Nome do item (ex: Petisco de Carneiro)">
    </div>
    <button class="btn btn-primary btn-full" onclick="addPetiscoItem('${tab}')"><i class="fas fa-plus"></i> Adicionar</button>
  </div>`;

  document.getElementById('content').innerHTML=html;
}

function setPetiscosTab(tab){
  state.petiscosTab=tab;
  renderPetiscos();
}

function setPetiscoField(tab, idx, field, val){
  if(!state.petiscosToday) state.petiscosToday={};
  if(!state.petiscosToday[tab]) state.petiscosToday[tab]={};
  if(!state.petiscosToday[tab][idx]) state.petiscosToday[tab][idx]={};
  state.petiscosToday[tab][idx][field]=field==='kg'?parseFloat(val)||0:val;
}

function savePetiscoEntry(tab, idx){
  const item=state.db.petiscosItems[tab][idx];
  const today=state.petiscosToday?.[tab]?.[idx]||{};
  const date=today.date||state.today.date;
  const kg=today.kg||0;
  if(!kg||kg<=0){toast('⚠️ Informe o peso produzido');return;}

  if(!state.db.petiscosHistory) state.db.petiscosHistory=[];
  // remove entrada anterior do mesmo item+data para evitar duplicar
  state.db.petiscosHistory=state.db.petiscosHistory.filter(p=>!(p.item===item&&p.date===date&&p.category===tab));
  state.db.petiscosHistory.push({
    id:'p'+Date.now()+Math.random().toString(36).slice(2,6),
    category:tab, item, date, kg,
    savedAt:new Date().toLocaleString('pt-BR')
  });
  saveData();
  toast(`✅ ${item} — ${kg}kg em ${fmtDateShort(date)} salvo!`);
  // limpa o campo
  if(state.petiscosToday?.[tab]) delete state.petiscosToday[tab][idx];
  renderPetiscos();
}

function addPetiscoItem(tab){
  const name=document.getElementById('new-petisco-name')?.value.trim();
  if(!name){toast('⚠️ Informe o nome do item');return;}
  if(!state.db.petiscosItems[tab]) state.db.petiscosItems[tab]=[];
  if(state.db.petiscosItems[tab].includes(name)){toast('⚠️ Item já cadastrado');return;}
  state.db.petiscosItems[tab].push(name);
  saveData(); renderPetiscos();
  toast(`✅ "${name}" adicionado!`);
}

function deletePetiscoItem(tab, idx){
  const item=state.db.petiscosItems[tab][idx];
  openModal(`<div class="modal-title">Excluir item?</div>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:20px">Remover <strong>"${item}"</strong> da lista de ${PETISCO_TABS.find(t=>t.key===tab).label}? O histórico de produções já salvas não será afetado.</p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-danger btn-full" onclick="confirmDeletePetiscoItem('${tab}',${idx})">Sim, excluir</button>
      <button class="btn btn-full" onclick="closeModal()">Cancelar</button>
    </div>`);
}

function confirmDeletePetiscoItem(tab, idx){
  state.db.petiscosItems[tab].splice(idx,1);
  saveData(); closeModal(); renderPetiscos();
  toast('🗑 Item excluído');
}

// ── RELATÓRIO DE PRODUÇÃO POR PERÍODO ────────────────────────
function renderRelatorio(){
  if(!state.relPeriodo) state.relPeriodo={de:todayStr(),ate:todayStr()};
  const html=`<div class="card-title" style="margin-bottom:14px;font-family:'Coolvetica','DM Sans',sans-serif;font-size:18px">Relatório de Produção</div>
    <div class="card">
      <div class="card-header"><span class="card-title"><i class="fas fa-calendar-alt"></i> Selecione o período</span></div>
      <div class="row2">
        <div class="field">
          <label>De</label>
          <input type="date" id="rel-de" value="${state.relPeriodo.de}" onchange="state.relPeriodo.de=this.value">
        </div>
        <div class="field">
          <label>Até</label>
          <input type="date" id="rel-ate" value="${state.relPeriodo.ate}" onchange="state.relPeriodo.ate=this.value">
        </div>
      </div>
      <button class="gen-btn" style="border-radius:10px;width:100%;margin-top:8px" onclick="gerarRelatorioPeriodo()">
        <i class="fas fa-file-pdf"></i> Gerar Relatório de Produção por Período
      </button>
    </div>
    <div class="card" style="margin-top:14px;background:var(--bg)">
      <div style="font-size:12px;color:var(--text-2);line-height:1.6">
        <i class="fas fa-info-circle" style="color:var(--blue)"></i> Este relatório reúne o total produzido por dia — somando receitas e petiscos/mastigáveis — em uma tabela única, ideal para apresentação a fiscais do Ministério da Agricultura.
      </div>
    </div>`;
  document.getElementById('content').innerHTML=html;
}

function mesExtenso(m){
  return ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'][m-1].toUpperCase();
}

function gerarRelatorioPeriodo(){
  const de=document.getElementById('rel-de')?.value||state.relPeriodo.de;
  const ate=document.getElementById('rel-ate')?.value||state.relPeriodo.ate;
  if(!de||!ate){toast('⚠️ Selecione o período');return;}
  if(de>ate){toast('⚠️ Data inicial deve ser anterior à final');return;}

  // coleta todos os dias do período com produção (receitas ou petiscos)
  const history=(state.db.history||[]).filter(h=>h.date>=de&&h.date<=ate);
  const petHistory=(state.db.petiscosHistory||[]).filter(p=>p.date>=de&&p.date<=ate);

  // monta set de todas as colunas de petiscos/caldos/saborizantes que aparecem no período
  const itemCols=[...new Set(petHistory.map(p=>p.item))].sort((a,b)=>a.localeCompare(b,'pt'));

  // monta mapa data -> {receitas: kg, [item]: kg}
  const dateMap={};
  history.forEach(h=>{
    if(!dateMap[h.date]) dateMap[h.date]={};
    dateMap[h.date]['__receitas']=(dateMap[h.date]['__receitas']||0)+parseFloat(h.totalKg||0);
  });
  petHistory.forEach(p=>{
    if(!dateMap[p.date]) dateMap[p.date]={};
    dateMap[p.date][p.item]=(dateMap[p.date][p.item]||0)+p.kg;
  });

  const dates=Object.keys(dateMap).sort();
  if(!dates.length){toast('⚠️ Nenhuma produção encontrada nesse período');return;}

  // ── GERAR PDF (paisagem) ──
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const PW=297, PH=210, L=10, R=287;

  // cabeçalho
  doc.setFillColor(181,205,90);
  doc.rect(0,0,PW,22,'F');
  doc.setTextColor(26,29,35);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('Relatório de Produção PetNaturau', L, 10);

  const [dY,dM,dD]=de.split('-');
  const [aY,aM,aD]=ate.split('-');
  const periodoStr=`De ${parseInt(dD)} de ${mesExtenso(parseInt(dM))} de ${dY} até ${parseInt(aD)} de ${mesExtenso(parseInt(aM))} de ${aY}`;
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text(periodoStr, L, 17);
  doc.setTextColor(26,29,35);

  let y=28;
  doc.setFontSize(9);
  doc.text(`Emitido em: ${new Date().toLocaleDateString('pt-BR')}`, R, 17, {align:'right'});

  // monta tabela
  const head=['Data','Receitas (kg)',...itemCols.map(c=>c+' (kg)'),'TOTAL (kg)'];
  const body=dates.map(date=>{
    const row=dateMap[date];
    const receitasKg=row['__receitas']||0;
    const cols=itemCols.map(c=>row[c]?row[c].toFixed(2):'—');
    const totalDia=receitasKg+itemCols.reduce((a,c)=>a+(row[c]||0),0);
    return [fmtDateShort(date), receitasKg>0?receitasKg.toFixed(2):'—', ...cols, totalDia.toFixed(2)];
  });

  // linha de totais
  const totalReceitas=dates.reduce((a,d)=>a+(dateMap[d]['__receitas']||0),0);
  const totalPorItem=itemCols.map(c=>dates.reduce((a,d)=>a+(dateMap[d][c]||0),0));
  const totalGeral=totalReceitas+totalPorItem.reduce((a,v)=>a+v,0);
  body.push([
    {content:'TOTAL DO PERÍODO',styles:{fontStyle:'bold',fillColor:[238,244,208],textColor:[143,163,66]}},
    {content:totalReceitas.toFixed(2),styles:{fontStyle:'bold',fillColor:[238,244,208],textColor:[143,163,66]}},
    ...totalPorItem.map(v=>({content:v.toFixed(2),styles:{fontStyle:'bold',fillColor:[238,244,208],textColor:[143,163,66]}})),
    {content:totalGeral.toFixed(2),styles:{fontStyle:'bold',fillColor:[181,205,90],textColor:[26,29,35]}}
  ]);

  doc.autoTable({
    startY:y, head:[head], body,
    styles:{fontSize:8,cellPadding:2.5,halign:'center'},
    headStyles:{fillColor:COR_PERSONAL_L,textColor:TEXT_PERSONAL,fontStyle:'bold',fontSize:8},
    columnStyles:{0:{halign:'left',fontStyle:'bold',cellWidth:25}},
    margin:{left:L,right:10},
    didDrawPage:(data)=>{
      // rodapé com número de página
      doc.setFontSize(7); doc.setTextColor(150,150,150);
      doc.text(`Página ${doc.internal.getNumberOfPages()}`, PW-15, PH-6);
      doc.setTextColor(26,29,35);
    }
  });

  y=doc.lastAutoTable.finalY+10;

  // assinatura final
  if(y<PH-20){
    doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Responsável técnico: ____________________________________', L, y);
    doc.text('Data de emissão: _____ / _____ / _______', 200, y);
    y+=10;
    doc.setFontSize(7); doc.setTextColor(120,120,120);
    doc.text('PetNaturau — Controle de Produção e Rastreabilidade — RE002/POP5-POP9', L, y);
    doc.setTextColor(26,29,35);
  }

  const deShort=fmtDateShort(de).replace(/\//g,'-');
  const ateShort=fmtDateShort(ate).replace(/\//g,'-');
  doc.save(`relatorio-producao-${deShort}_a_${ateShort}.pdf`);
  toast('📄 Relatório gerado com sucesso!');
}

// ── INIT ──────────────────────────────────────────────────
const gotToken = checkAuthCallback();
if (gotToken) {
  loadData();
} else {
  const raw = localStorage.getItem('petnaturau-db');
  if (raw) {
    state.driveToken = 'local';
    document.getElementById('auth-btn').className = 'auth-btn connected';
    document.getElementById('auth-label').textContent = 'Local ✓';
    state.db = JSON.parse(raw);
    ensureDbShape();
    render();
  } else {
    render(); // mostra tela de boas-vindas
  }
}
</script>
