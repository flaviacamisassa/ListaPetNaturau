<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PetNaturau — Lista de Produção</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
@font-face {
  font-family: 'Coolvetica';
  src: url('https://fonts.cdnfonts.com/css/coolvetica') format('woff2');
}
:root {
  --bg: #ceecf1;
  --bg2: #b8e0e7;
  --card: #ffffff;
  --green: #b5cd5a;
  --green-dark: #8fa342;
  --green-light: #eef4d0;
  --red: #C0392B;
  --red-light: #FDEDEC;
  --amber: #E67E22;
  --amber-light: #FEF5E7;
  --blue: #2980B9;
  --blue-light: #EBF5FB;
  --border: #c0dde3;
  --border-strong: #9fc8d0;
  --text: #1A1D23;
  --text-2: #4a5568;
  --text-3: #718096;
  --radius: 14px;
  --radius-sm: 9px;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
  --shadow-lg: 0 4px 20px rgba(0,0,0,.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

/* ── LAYOUT ─── */
#app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; position: relative; }
.topbar { background: var(--card); border-bottom: 2px solid var(--green); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.topbar-logo .dot { width: 36px; height: 36px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.topbar-logo .dot i { color: white; font-size: 18px; }
.brand-name { font-family: 'Coolvetica', 'DM Sans', sans-serif; font-size: 20px; font-weight: 400; color: var(--text); letter-spacing: .5px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.auth-btn { display: flex; align-items: center; gap: 5px; padding: 6px 10px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--bg); font-size: 12px; cursor: pointer; color: var(--text-2); font-family: 'DM Sans', sans-serif; transition: all .15s; }
.auth-btn.connected { border-color: var(--green-dark); color: var(--green-dark); background: var(--green-light); }

.content { flex: 1; overflow-y: auto; padding: 14px; padding-bottom: 84px; }
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--card); border-top: 2px solid var(--green); display: flex; z-index: 100; box-shadow: 0 -2px 12px rgba(0,0,0,.08); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 13px; cursor: pointer; border: none; background: none; color: var(--text-3); font-size: 10px; font-family: 'DM Sans', sans-serif; transition: color .15s; }
.nav-btn i { font-size: 20px; }
.nav-btn.active { color: var(--green-dark); }
.nav-btn.active i { color: var(--green-dark); }

/* ── DATE PICKER BAR ─── */
.date-bar { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--green); padding: 10px 14px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); }
.date-bar-left { display: flex; align-items: center; gap: 8px; }
.date-bar-left i { color: var(--green-dark); font-size: 16px; }
.date-display { font-family: 'Coolvetica', 'DM Sans', sans-serif; font-size: 16px; color: var(--text); letter-spacing: .3px; }
.date-sub { font-size: 11px; color: var(--text-3); font-family: 'DM Mono', monospace; }
.date-picker-input { opacity: 0; position: absolute; width: 1px; height: 1px; }
.change-date-btn { font-size: 12px; color: var(--green-dark); background: var(--green-light); border: 1px solid var(--green); border-radius: 20px; padding: 4px 10px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; }

/* ── CARDS ─── */
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-family: 'Coolvetica', 'DM Sans', sans-serif; font-size: 16px; font-weight: 400; letter-spacing: .3px; }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: .7px; text-transform: uppercase; color: var(--text-3); margin: 14px 0 8px; }

/* ── BUTTONS ─── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--card); color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-weight: 600; transition: all .15s; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--green); color: var(--text); border-color: var(--green-dark); }
.btn-primary:hover { background: var(--green-dark); color: white; }
.btn-danger { color: var(--red); border-color: #F5C6C2; }
.btn-danger:hover { background: var(--red-light); }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-icon { padding: 6px 8px; border-radius: 8px; }
.btn-full { width: 100%; justify-content: center; }

/* ── BADGES ─── */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-green { background: var(--green-light); color: var(--green-dark); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-gray { background: #EDF2F7; color: var(--text-2); }

/* ── FORMS ─── */
label { font-size: 13px; color: var(--text-2); display: block; margin-bottom: 5px; font-weight: 600; }
input, select, textarea { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); outline: none; transition: border-color .15s; }
input:focus, select:focus, textarea:focus { border-color: var(--green-dark); background: white; }
.field { margin-bottom: 12px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

/* ── TABS ─── */
.tabs { display: flex; background: var(--bg2); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 14px; gap: 2px; }
.tab-btn { flex: 1; padding: 8px 4px; text-align: center; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--text-2); font-family: 'DM Sans', sans-serif; transition: all .15s; }
.tab-btn.active { background: var(--green); color: var(--text); box-shadow: var(--shadow); }

/* ── RECIPE CARDS ─── */
.recipe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.recipe-card { border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; background: var(--card); transition: all .15s; position: relative; }
.recipe-card:active { transform: scale(.96); }
.recipe-card.selected { border-color: var(--green-dark); background: var(--green-light); }
.recipe-card.selected-barf { border-color: var(--red); background: var(--red-light); }
.rc-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; line-height: 1.3; }
.rc-sub { font-size: 10px; color: var(--text-2); margin-bottom: 6px; }
.rc-check { position: absolute; top: 8px; right: 8px; width: 18px; height: 18px; border-radius: 50%; background: var(--green-dark); display: none; align-items: center; justify-content: center; }
.recipe-card.selected .rc-check { display: flex; }
.recipe-card.selected-barf .rc-check { display: flex; background: var(--red); }
.rc-check i { color: white; font-size: 10px; }

/* ── PACKET SECTION ─── */
.pkt-section { background: var(--bg); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; border: 1.5px solid var(--border); }
.pkt-name { font-size: 13px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.pkt-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.pkt-col-label { font-size: 11px; font-weight: 700; color: var(--text-2); text-align: center; margin-bottom: 6px; letter-spacing: .3px; }
.pkt-stepper { display: flex; align-items: center; gap: 6px; justify-content: center; }
.pkt-stepper button { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 20px; line-height: 1; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text); font-weight: 300; }
.pkt-stepper button:active { background: var(--green-light); border-color: var(--green-dark); }
.pkt-stepper input { width: 52px; text-align: center; font-size: 17px; font-weight: 700; border-radius: 8px; padding: 5px; background: white; }
.pkt-sub { font-size: 11px; color: var(--blue); text-align: center; margin-top: 4px; min-height: 16px; font-weight: 600; }
.custom-box { border: 1.5px dashed var(--green-dark); border-radius: var(--radius-sm); padding: 10px; background: white; }
.custom-box-title { font-size: 11px; font-weight: 700; color: var(--green-dark); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .4px; }
.custom-entry { display: flex; align-items: center; gap: 6px; background: var(--green-light); border-radius: 6px; padding: 5px 8px; margin-bottom: 6px; font-size: 12px; }
.custom-entry .ce-name { flex: 1; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.custom-entry .ce-detail { color: var(--green-dark); white-space: nowrap; font-weight: 600; }
.custom-entry button { background: none; border: none; color: var(--red); font-size: 16px; cursor: pointer; }
.custom-add-form input { margin-bottom: 6px; font-size: 12px; background: var(--bg); }
.custom-add-btn { width: 100%; padding: 7px; border-radius: 7px; border: 1.5px solid var(--green-dark); background: var(--green-light); color: var(--green-dark); font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.custom-add-btn:active { background: var(--green); }
.pkt-total-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1.5px solid var(--border); font-size: 12px; margin-top: 8px; }
.pkt-total-val { font-weight: 700; color: var(--green-dark); font-size: 15px; font-family: 'DM Mono', monospace; }

/* ── LIST ITEMS ─── */
.list-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.list-item:last-child { border-bottom: none; }
.li-name { font-size: 13px; font-weight: 700; }
.li-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
.li-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

/* ── HISTORY ─── */
.history-item { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border); margin-bottom: 8px; cursor: pointer; transition: all .15s; box-shadow: var(--shadow); }
.history-item:active { transform: scale(.98); border-color: var(--green-dark); }
.hi-date { font-family: 'Coolvetica', 'DM Sans', sans-serif; font-size: 15px; letter-spacing: .3px; }
.hi-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
.hi-kg { font-weight: 700; color: var(--green-dark); font-family: 'DM Mono', monospace; font-size: 14px; }

/* ── STATS ─── */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.stat-box { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 8px; text-align: center; }
.stat-val { font-size: 22px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; }
.stat-lbl { font-size: 10px; color: var(--text-3); margin-top: 2px; text-transform: uppercase; letter-spacing: .4px; font-weight: 600; }

/* ── EMPTY ─── */
.empty { text-align: center; padding: 32px 16px; color: var(--text-3); }
.empty i { font-size: 40px; margin-bottom: 10px; opacity: .4; display: block; }
.empty p { font-size: 13px; }

/* ── MODAL ─── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--card); border-radius: 22px 22px 0 0; padding: 20px 16px 36px; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title { font-family: 'Coolvetica', 'DM Sans', sans-serif; font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; letter-spacing: .3px; }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }

/* ── TOAST ─── */
.toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); background: #1A1D23; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; font-weight: 600; }
.toast.show { opacity: 1; }

/* ── ING ROW ─── */
.ing-row { display: grid; grid-template-columns: 2fr 75px 95px 32px; gap: 5px; align-items: center; margin-bottom: 6px; }
.ing-row input, .ing-row select { font-size: 12px; padding: 6px 8px; }

/* ── MP TABLE ─── */
.mp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.mp-table th { text-align: left; padding: 6px 8px; font-size: 11px; color: var(--text-2); border-bottom: 1px solid var(--border); background: var(--bg); font-weight: 700; }
.mp-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.mp-table .sec-coz td { background: var(--green-light); color: var(--green-dark); font-size: 11px; font-weight: 700; }
.mp-table .sec-cru td { background: var(--red-light); color: var(--red); font-size: 11px; font-weight: 700; }
.mp-table .row-cru td { background: #FFF8F8; }
.mp-table .row-total td { font-weight: 700; background: var(--green-light); color: var(--green-dark); }

/* ── GENERATE BTN ─── */
.gen-btn-wrap { position: sticky; bottom: 84px; padding: 10px 0; }
.gen-btn { background: var(--green); color: var(--text); border: 2px solid var(--green-dark); border-radius: 14px; padding: 14px; width: 100%; font-size: 15px; font-weight: 700; font-family: 'Coolvetica', 'DM Sans', sans-serif; cursor: pointer; letter-spacing: .3px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 16px rgba(181,205,90,.5); transition: all .15s; }
.gen-btn:active { transform: scale(.97); box-shadow: none; }

@media print { body { font-size: 11px; } .bottom-nav, .topbar, .no-print { display: none !important; } }
</style>
</head>

  if (!str) return '';

  const dt = new Date(y, parseInt(m)-1, parseInt(d));
  return `${days[dt.getDay()]}, ${d} de ${names[parseInt(m)]} de ${y}`;
}

function fmtDateShort(str) {
  if (!str) return '';

const catBadge = c => ({Frango:'badge-green',Boi:'badge-amber',Pato:'badge-gray',Porco:'badge-gray',Peru:'badge-gray',Peixe:'badge-blue',Misto:'badge-gray'}[c]||'badge-gray');

function totalGofSel(s) {
  if (!s) return 0;
  if (s.recipe?.type === 'personalizada') return (s.qty||0) * (s.recipe?.pktG||0);
  return (s.p200||0)*200 + (s.p500||0)*500 + (s.customs||[]).reduce((a,c)=>a+c.qty*c.g,0);
}

// ── GOOGLE DRIVE AUTH ────────────────────────────────────
function handleAuth() {
  if (state.driveToken && state.driveToken !== 'local') {
    if (confirm('Desconectar do Google Drive?')) {
      state.driveToken = null; state.driveFileId = null;
      localStorage.removeItem('petnaturau-drive-token');
      localStorage.removeItem('petnaturau-drive-token-exp');
      document.getElementById('auth-btn').className = 'auth-btn';
      document.getElementById('auth-label').textContent = 'Drive';
      toast('Desconectado do Drive');
    }
    return;
  }
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: location.origin + location.pathname,
    response_type: 'token',
    scope: SCOPES,
    prompt: 'select_account'
  });
  location.href = 'https://accounts.google.com/o/oauth2/auth?' + params;
}

function checkAuthCallback() {
  const hash = location.hash;
  if (hash.includes('access_token')) {
    const p = new URLSearchParams(hash.slice(1));
    state.driveToken = p.get('access_token');
    const exp = Date.now() + (parseInt(p.get('expires_in')||3600)*1000);
    localStorage.setItem('petnaturau-drive-token', state.driveToken);
    localStorage.setItem('petnaturau-drive-token-exp', exp);
    history.replaceState(null, '', location.pathname);
    document.getElementById('auth-btn').className = 'auth-btn connected';
    document.getElementById('auth-label').textContent = 'Drive ✓';
    return true;
  }
  // restore saved token if not expired
  const saved = localStorage.getItem('petnaturau-drive-token');
  const exp = parseInt(localStorage.getItem('petnaturau-drive-token-exp')||0);
  if (saved && Date.now() < exp) {
    state.driveToken = saved;
    document.getElementById('auth-btn').className = 'auth-btn connected';
    document.getElementById('auth-label').textContent = 'Drive ✓';
    return true;
  }
  return false;
}

// ── DATA PERSISTENCE ─────────────────────────────────────
async function loadData() {
  if (state.driveToken === 'local') {
    const raw = localStorage.getItem('petnaturau-db');
    state.db = raw ? JSON.parse(raw) : defaultDB();
    render(); return;
  }
  toast('🔄 Carregando dados do Drive…', 4000);
  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}'+and+trashed=false&spaces=drive&fields=files(id,name)`,
      {headers:{Authorization:`Bearer ${state.driveToken}`}}
    );
    const data = await res.json();
    if (data.files && data.files.length > 0) {
      state.driveFileId = data.files[0].id;
      const r2 = await fetch(
        `https://www.googleapis.com/drive/v3/files/${state.driveFileId}?alt=media`,
        {headers:{Authorization:`Bearer ${state.driveToken}`}}
      );
      state.db = await r2.json();
      toast('✅ Dados carregados do Drive!');
    } else {
      state.db = defaultDB();
      await saveData();
    }
  } catch(e) {
    console.error(e);
    const raw = localStorage.getItem('petnaturau-db');
    state.db = raw ? JSON.parse(raw) : defaultDB();
    toast('⚠️ Drive indisponível, usando dados locais');
  }
  render();
}

async function saveData() {
  if (!state.db) return;
  const body = JSON.stringify(state.db, null, 2);
  // sempre salva local como backup
  localStorage.setItem('petnaturau-db', body);
  if (!state.driveToken || state.driveToken === 'local') return;
  try {
    if (state.driveFileId) {
      await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${state.driveFileId}?uploadType=media`,
        {method:'PATCH', headers:{Authorization:`Bearer ${state.driveToken}`,'Content-Type':'application/json'}, body}
      );
    } else {
      const meta = await fetch(
        'https://www.googleapis.com/drive/v3/files',
        {method:'POST', headers:{Authorization:`Bearer ${state.driveToken}`,'Content-Type':'application/json'},
         body:JSON.stringify({name:FILE_NAME,mimeType:'application/json',parents:["16dOp9n_WWl_0N6aQ6am3su3XenvkZWFv"]})}
      );
      const mj = await meta.json(); state.driveFileId = mj.id;
      await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${state.driveFileId}?uploadType=media`,
        {method:'PATCH', headers:{Authorization:`Bearer ${state.driveToken}`,'Content-Type':'application/json'}, body}
      );
    }
    toast('💾 Salvo no Drive');
  } catch(e) { toast('⚠️ Erro ao salvar no Drive'); }
}

function renderProducao() {
  const db = state.db;
  const sel = state.today.selected;
  const selIds = Object.keys(sel);
  const totalG = selIds.reduce((a,id)=>a+totalGofSel(sel[id]),0);
  const tab = state.prodTab||'cozida';

  const comerciais = db.recipes.filter(r=>r.type==='comercial');
  const personalizadas = db.recipes.filter(r=>r.type==='personalizada');
  const tutors = [...new Set(personalizadas.map(r=>r.tutor))];

  let html = renderDateBar();

  // tabs
  html += `<div class="tabs">
    <button class="tab-btn ${tab==='cozida'?'active':''}" onclick="setProdTab('cozida')">🔥 Cozidas</button>
    <button class="tab-btn ${tab==='barf'?'active':''}" onclick="setProdTab('barf')">🥩 BARF</button>
    <button class="tab-btn ${tab==='personal'?'active':''}" onclick="setProdTab('personal')">👤 Personal.</button>
  </div>`;

  // grade de receitas
  if (tab==='cozida') {
    const coz = comerciais.filter(r=>!r.barf);
    if(!coz.length) html+=`<div class="empty"><i class="fas fa-utensils"></i><p>Nenhuma receita cozida cadastrada</p></div>`;
    else html += `<div class="recipe-grid">` + coz.map(r=>{
      const isSel = !!sel[r.id];
      const shortName = r.name.replace('Dieta Comercial ','');
      return `<div class="recipe-card ${isSel?'selected':''}" onclick="toggleRecipe('${r.id}')">
        <div class="rc-check"><i class="fas fa-check"></i></div>
        <div class="rc-name">${shortName}</div>
        <div class="rc-sub">${r.subname}</div>
        <span class="badge ${catBadge(r.cat)}" style="font-size:10px">${r.cat}</span>
      </div>`;
    }).join('')+`</div>`;
  } else if (tab==='barf') {
    const barf = comerciais.filter(r=>r.barf);
    if (!barf.length) html += `<div class="empty"><i class="fas fa-leaf"></i><p>Nenhuma receita BARF cadastrada</p></div>`;
    else html += `<div class="recipe-grid">`+barf.map(r=>{
      const isSel=!!sel[r.id];
      return `<div class="recipe-card ${isSel?'selected-barf':''}" onclick="toggleRecipe('${r.id}')">

      </div>`;
    }).join('')+`</div>`;
  } else {
    // PESSOAL — barra de busca + pastas por tutor
    const pq = state.prodSearch||'';
    html += `<div style="position:relative;margin-bottom:10px">

        oninput="debounceProdSearch(this.value)"

    </div>`;
    const filteredP = pq
      ? personalizadas.filter(r=>r.dog.toLowerCase().includes(pq.toLowerCase())||r.tutor.toLowerCase().includes(pq.toLowerCase()))
      : personalizadas;
    if(!filteredP.length){
      html+=`<div class="empty"><i class="fas fa-search"></i><p>${pq?`Nenhum resultado para "${pq}"`:'Nenhuma dieta personalizada cadastrada'}</p></div>`;
    } else {

// ── COMPUTE MP ───────────────────────────────────────────
function computeMP(selected){
  const mp={};
  Object.values(selected).forEach(s=>{
    const r=s.recipe; if(!r) return;
    let mult; // multiplier for ingredients
    if(r.type==='comercial'){
      const tg=(s.p200||0)*200+(s.p500||0)*500+(s.customs||[]).reduce((a,c)=>a+c.qty*c.g,0);
      mult=tg/1000; // comercial: ingredients per kg, so mult=kg
    } else {
      // personalizada: ingredients are per unit produced (defQty = days/units cooked)
      // pkts = number of packages for labeling (may differ, e.g. 2 portions/day = 2x pkts)
      // The multiplier for ingredients must always be the number of UNITS PRODUCED (defQty)
      mult=s.unidades!==undefined?s.unidades:(r.defQty||30);
    }
    if(!mult) return;
    r.ingredients.forEach(ing=>{
      const raw=ing.raw||false;
      const k=ing.n.toLowerCase()+'__'+(raw?'cru':'coz');
      if(!mp[k]) mp[k]={name:ing.n,total:0,raw};
      mp[k].total+=ing.q*mult;
    });
  });
  return Object.values(mp).sort((a,b)=>a.raw!==b.raw?(a.raw?1:-1):a.name.localeCompare(b.name,'pt'));
}

// ── GERAR PDF ────────────────────────────────────────────
function gerarRelatorio(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const sel=state.today.selected;
  const mp=computeMP(sel);
  const totalMP=mp.reduce((a,x)=>a+x.total,0);
  const dateStr=fmtDate(state.today.date);
  const dateShort=fmtDateShort(state.today.date).replace(/\//g,'-');
  const L=14, W=182;

  // HEADER verde
  doc.setFillColor(181,205,90);
  doc.rect(0,0,210,30,'F');
  doc.setTextColor(26,29,35);
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text('PetNaturau', L, 13);
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text('Lista de Produção — '+dateStr, L, 20);
  doc.setFontSize(9);
  doc.text('Data fabricação: _____ / _____ / _______', L, 27);
  doc.text('Lote PetNaturau: ___________________', 120, 27);
  let y=38;
  doc.setTextColor(26,29,35);

  // PEDIDOS
  const secHeader=(title)=>{
    doc.setFillColor(181,205,90);
    doc.rect(L,y,W,7,'F');
    doc.setTextColor(26,29,35);
    doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text(title, L+2, y+5);
    doc.setTextColor(26,29,35);
    y+=10;
  };

  secHeader('PEDIDOS DO DIA');
  const pedRows=[];
  Object.values(sel).forEach(s=>{
    const r=s.recipe; if(!r) return;
    if(r.type==='comercial'){
      const tg=(s.p200||0)*200+(s.p500||0)*500+(s.customs||[]).reduce((a,c)=>a+c.qty*c.g,0);
      if(!tg) return;
      const pad=[]; if((s.p200||0)>0)pad.push(s.p200+'×200g'); if((s.p500||0)>0)pad.push(s.p500+'×500g');
      const cust=(s.customs||[]).map(c=>`${c.qty}×${c.g}g (${c.name})`).join(', ');
      pedRows.push([r.name+(r.barf?' [BARF]':''),pad.join(' + ')||'—',cust||'—',(tg/1000).toFixed(2)+' kg']);
    } else {
      const unidades=s.unidades!==undefined?s.unidades:(r.defQty||30);
      const tg=unidades*(r.pktG||0);
      const embLabel=r.pkts&&r.pkts!==r.defQty?`${r.pkts} pacotes de ${r.pktG}g`:(r.pktG?`${r.pkts||unidades} pacotes de ${r.pktG}g`:'—');
      pedRows.push([`${r.tutor} — ${r.dog}`,`${unidades} unidades produzidas`,embLabel,tg>0?(tg/1000).toFixed(2)+' kg':`${unidades} unid`]);
    }
  });
  doc.autoTable({startY:y,head:[['Receita','Pacotes padrão','Personalizado','Total']],body:pedRows,
    styles:{fontSize:9,cellPadding:3},headStyles:{fillColor:[181,205,90],textColor:[26,29,35],fontStyle:'bold'},
    columnStyles:{0:{cellWidth:58},1:{cellWidth:38},2:{cellWidth:57},3:{cellWidth:29,halign:'right',fontStyle:'bold'}},margin:{left:L,right:14}});
  y=doc.lastAutoTable.finalY+8;

  // INGREDIENTES POR RECEITA
  if(y>240){doc.addPage();y=15;}
  secHeader('INGREDIENTES POR RECEITA');
  Object.values(sel).forEach(s=>{
    const r=s.recipe; if(!r) return;
    let mult, totalLabel;
    if(r.type==='comercial'){
      const tg=(s.p200||0)*200+(s.p500||0)*500+(s.customs||[]).reduce((a,c)=>a+c.qty*c.g,0);
      if(!tg) return;
      mult=tg/1000; // kg for comercial (ingredients are per kg)
      totalLabel=(mult).toFixed(2)+' kg';
    } else {
      // unidades = units actually cooked; pkts = packaging labels (may be 2x for 2 portions/day)
      mult=s.unidades!==undefined?s.unidades:(r.defQty||30);
      if(!mult) return;
      const totalG=mult*(r.pktG||0);
      const embInfo=r.pkts&&r.pkts!==mult?` · embalar ${r.pkts} pacotes de ${r.pktG}g`:(r.pktG?` · ${r.pktG}g/pacote`:'');
      totalLabel=`${mult} unid produzidas${embInfo}`;
    }
    if(y>240){doc.addPage();y=15;}
    const rows=r.ingredients.sort((a,b)=>a.n.localeCompare(b.n,'pt')).map(ing=>{
      const tot=ing.q*mult;
      return [ing.n+(ing.raw?' 🥩':''),tot>=1000?(tot/1000).toFixed(3)+' kg':Math.round(tot)+' g'];
    });
    doc.autoTable({startY:y,
      head:[[{content:`${recName(r)} — ${totalLabel}`,colSpan:2,styles:{fillColor:[238,244,208],textColor:[143,163,66],fontStyle:'bold',fontSize:9}}]],
      body:rows,styles:{fontSize:8,cellPadding:2.5},
      columnStyles:{0:{cellWidth:130},1:{cellWidth:52,halign:'right'}},margin:{left:L,right:14}});
    y=doc.lastAutoTable.finalY+5;
  });

  // TOTAL MP
  if(y>200){doc.addPage();y=15;}
  secHeader('TOTAL DE MATÉRIA-PRIMA');
  const mpRows=[];
  let lastRaw=null;
  mp.forEach(e=>{
    if(e.raw!==lastRaw){
      mpRows.push([{content:e.raw?'🥩 CRUS — separar do fluxo de cozimento':'🔥 COZIDOS — pré-preparo sexta-feira',
        colSpan:7,styles:{fillColor:e.raw?[253,237,236]:[238,244,208],textColor:e.raw?[192,57,43]:[143,163,66],fontStyle:'bold',fontSize:9}}]);
      lastRaw=e.raw;
    }
    mpRows.push([e.name,e.raw?'Cru':'Cozido',Math.round(e.total)+' g',(e.total/1000).toFixed(3)+' kg','','',e.raw?'—':'']);
  });
  mpRows.push([{content:'TOTAL GERAL',colSpan:2,styles:{fontStyle:'bold',fillColor:[238,244,208],textColor:[143,163,66]}},
    {content:Math.round(totalMP)+' g',styles:{fontStyle:'bold',fillColor:[238,244,208],textColor:[143,163,66]}},
    {content:(totalMP/1000).toFixed(3)+' kg',styles:{fontStyle:'bold',fillColor:[238,244,208],textColor:[143,163,66]}},
    {content:'',colSpan:3,styles:{fillColor:[238,244,208]}}]);

  doc.autoTable({startY:y,head:[['Ingrediente','Preparo','Total (g)','Total (kg)','Marca','Lote Fornecedor','Temp °C']],body:mpRows,
    styles:{fontSize:8,cellPadding:3},headStyles:{fillColor:[181,205,90],textColor:[26,29,35],fontStyle:'bold'},
    columnStyles:{0:{cellWidth:44},1:{cellWidth:17},2:{cellWidth:22},3:{cellWidth:22},4:{cellWidth:30},5:{cellWidth:30},6:{cellWidth:17}},
    margin:{left:L,right:14}});
  y=doc.lastAutoTable.finalY+14;

  // ASSINATURAS
  if(y>262){doc.addPage();y=15;}
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('Data de fabricação: _____ / _____ / _______',L,y);
  doc.text('Data: _____ / _____ / _______',130,y); y+=14;
  doc.line(L,y,L+76,y); doc.line(130,y,L+W,y); y+=5;
  doc.setFontSize(8);
  doc.text('Responsável pelo preenchimento',L,y);
  doc.text('Validação do responsável técnico',130,y);

  // SALVAR HISTÓRICO
  const hist={
    id:'h'+Date.now(), date:state.today.date, dateStr:fmtDate(state.today.date),
    recipes:Object.values(sel).map(s=>recName(s.recipe)).filter(Boolean),
    totalKg:(totalMP/1000).toFixed(2),
    selected:JSON.parse(JSON.stringify(sel))
  };
  if(!state.db.history) state.db.history=[];
  // evita duplicar o mesmo dia
  state.db.history=state.db.history.filter(h=>h.date!==state.today.date);
  state.db.history.unshift(hist);
  if(state.db.history.length>90) state.db.history=state.db.history.slice(0,90);
  saveData();

  doc.save(`petnaturau-${dateShort}.pdf`);
  toast('📄 PDF gerado! Salvo no histórico.',3500);
  state.today={selected:{},date:state.today.date};
  renderProducao();
}

// ── RECEITAS ─────────────────────────────────────────────
function renderReceitas(){
  const tab=state.recipeTab||'comercial';
  const coz=state.db.recipes.filter(r=>r.type==='comercial'&&!r.barf);
  const barf=state.db.recipes.filter(r=>r.type==='comercial'&&r.barf);
  const pers=state.db.recipes.filter(r=>r.type==='personalizada');

  let html=`<div class="tabs">
    <button class="tab-btn ${tab==='comercial'?'active':''}" onclick="setRecTab('comercial')">Comerciais</button>
    <button class="tab-btn ${tab==='barf'?'active':''}" onclick="setRecTab('barf')">BARF</button>
    <button class="tab-btn ${tab==='pessoal'?'active':''}" onclick="setRecTab('pessoal')">Personal.</button>
  </div>`;

  const rItem=r=>{
    const emb=embStr(r);const cruC=r.ingredients.filter(i=>i.raw).length;
    return `<div class="list-item">
      <div style="flex:1">
        <div class="li-name">${recName(r)} ${r.barf?'<span class="badge badge-red" style="font-size:10px">BARF</span>':''}</div>
        <div class="li-meta">${r.ingredients.length} ing · ${r.type==='comercial'?'por kg':`${r.defQty} unid · ${r.temp}°C`}${cruC>0?` · <span style="color:var(--red)">${cruC} cru${cruC>1?'s':''}</span>`:''}</div>
        ${emb?`<div style="font-size:11px;color:var(--green-dark);margin-top:3px;font-weight:600">📦 ${emb}</div>`:''}
      </div>
      <div class="li-right">
        <span class="badge ${catBadge(r.cat)}" style="font-size:10px">${r.cat}</span>
        <button class="btn btn-icon btn-sm" onclick="editRecipe('${r.id}')"><i class="fas fa-edit"></i></button>
        <button class="btn btn-icon btn-sm btn-danger" onclick="deleteRecipe('${r.id}')"><i class="fas fa-trash-alt"></i></button>
      </div>
    </div>`;
  };

  if(tab==='comercial'){
    html+=`<div class="card"><div class="card-header"><span class="card-title">🔥 Cozidas (${coz.length})</span>
      <button class="btn btn-primary btn-sm" onclick="newRecipe('comercial')"><i class="fas fa-plus"></i> Nova</button></div>
      ${coz.length?coz.map(rItem).join(''):'<div class="empty"><i class="fas fa-utensils"></i><p>Nenhuma receita</p></div>'}
    </div>`;
  } else if(tab==='barf'){
    html+=`<div class="card"><div class="card-header"><span class="card-title">🥩 BARF (${barf.length})</span>
      <button class="btn btn-primary btn-sm" onclick="newRecipe('barf')"><i class="fas fa-plus"></i> Nova</button></div>
      ${barf.length?barf.map(rItem).join(''):'<div class="empty"><i class="fas fa-leaf"></i><p>Nenhuma receita BARF</p></div>'}
    </div>`;
  } else {
    const q=state.recipeSearch||'';
    if(!state.openTutors) state.openTutors={};
    if(!state.openDogs) state.openDogs={};
    html+=`<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
      <div style="flex:1;position:relative">
        <i class="fas fa-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:13px"></i>
        <input type="text" id="rec-search-input" placeholder="Buscar por cachorro ou tutor…" value="${q}"
          oninput="debounceRecSearch(this.value)"
          style="padding-left:32px;background:white">
      </div>
      <button class="btn btn-primary btn-sm" onclick="newRecipe('personalizada')"><i class="fas fa-plus"></i> Nova</button>
    </div>`;
    const filtered=q?pers.filter(r=>r.dog.toLowerCase().includes(q.toLowerCase())||r.tutor.toLowerCase().includes(q.toLowerCase())):pers;
    if(!filtered.length){html+=`<div class="card"><div class="empty"><i class="fas fa-search"></i><p>Nenhum resultado para "${q}"</p></div></div>`;}
    else{
      const filtTutors=[...new Set(filtered.map(r=>r.tutor))].sort((a,b)=>a.localeCompare(b,'pt'));
      filtTutors.forEach(tutor=>{
        const pets=filtered.filter(r=>r.tutor===tutor);
        const isOpen=state.openTutors[tutor]||!!q;
        html+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--green-light)">
            <div onclick="toggleTutor('${tutor.replace(/'/g,"\\'")}');event.stopPropagation()" style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer">
              <i class="fas fa-folder${isOpen?'-open':''}" style="color:var(--green-dark);font-size:16px"></i>
              <span style="font-family:'Coolvetica','DM Sans',sans-serif;font-size:16px">${tutor}</span>
              <span class="badge badge-green">${pets.length} pet${pets.length!==1?'s':''}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <i class="fas fa-chevron-${isOpen?'up':'down'}" style="color:var(--green-dark);font-size:12px;cursor:pointer" onclick="toggleTutor('${tutor.replace(/'/g,"\\'")}')"></i>
              <button class="btn btn-icon btn-sm btn-danger" title="Excluir pasta ${tutor}"
                onclick="deleteTutor('${tutor.replace(/'/g,"\\'")}');event.stopPropagation()"
                style="padding:4px 8px;font-size:11px">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>
          </div>
          ${isOpen?`<div style="padding:10px 12px 12px">`+pets.map(r=>{
            const dk=tutor+'__'+r.dog;
            const isDogOpen=state.openDogs[dk]||!!q;
            const versions=r.versions||[];
            const emb=embStr(r);
            const cruC=r.ingredients.filter(i=>i.raw).length;
            return `<div style="margin-top:8px;border:1px solid var(--border);border-radius:10px;overflow:hidden">
              <div onclick="toggleDog('${tutor.replace(/'/g,"\'")}','${r.dog.replace(/'/g,"\'")}')" style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;background:var(--bg)">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  <i class="fas fa-dog" style="color:var(--text-3);font-size:13px"></i>
                  <span style="font-weight:700;font-size:13px">${r.dog}</span>
                  <span class="badge ${catBadge(r.cat)}" style="font-size:10px">${r.cat}</span>
                  ${cruC>0?`<span style="color:var(--red);font-size:11px;font-weight:600">${cruC} cru${cruC>1?'s':''}</span>`:''}
                  ${versions.length>0?`<span class="badge badge-gray" style="font-size:10px">${versions.length} versão anterior${versions.length>1?'es':''}</span>`:''}
                </div>
                <i class="fas fa-chevron-${isDogOpen?'up':'down'}" style="color:var(--text-3);font-size:11px"></i>
              </div>
              ${isDogOpen?`<div style="padding:10px 12px;border-top:1px solid var(--border)">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">
                  <div>
                    <div style="font-size:11px;font-weight:700;color:var(--green-dark);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">📋 Receita atual</div>
                    <div style="font-size:12px;color:var(--text-2)">${r.ingredients.length} ing · ${r.pkts||r.defQty} pcts · ${r.pktG||'?'}g/pct · ${r.temp||'?'}°C</div>
                    ${emb?`<div style="font-size:11px;color:var(--green-dark);font-weight:600;margin-top:2px">📦 ${emb}</div>`:''}
                    <div style="font-size:11px;color:var(--text-3);margin-top:3px">${r.ingredients.slice(0,4).map(i=>i.n).join(', ')}${r.ingredients.length>4?'…':''}</div>
                  </div>
                  <div style="display:flex;gap:6px;flex-shrink:0">
                    <button class="btn btn-sm btn-primary" onclick="editRecipe('${r.id}');event.stopPropagation()"><i class="fas fa-edit"></i> Editar</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteRecipe('${r.id}');event.stopPropagation()"><i class="fas fa-trash-alt"></i></button>
                  </div>
                </div>
                ${versions.length>0?`<div style="margin-top:10px;border-top:1px dashed var(--border);padding-top:8px">
                  <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px"><i class="fas fa-history"></i> Versões anteriores</div>
                  ${versions.slice().reverse().map((v,vi)=>`<div style="background:var(--bg);border-radius:7px;padding:8px 10px;margin-bottom:5px;display:flex;align-items:flex-start;justify-content:space-between">
                    <div>
                      <div style="font-size:11px;font-weight:700;color:var(--text-2)">Salva em ${v.savedAt||'?'}</div>
                      <div style="font-size:11px;color:var(--text-3)">${v.ingredients.length} ing · ${v.defQty||'?'} unid · ${v.temp||'?'}°C</div>
                      <div style="font-size:11px;color:var(--text-3)">${v.ingredients.slice(0,3).map(i=>i.n).join(', ')}${v.ingredients.length>3?'…':''}</div>
                    </div>
                    <button class="btn btn-sm" onclick="viewVersion('${r.id}',${versions.length-1-vi});event.stopPropagation()" style="font-size:11px"><i class="fas fa-eye"></i></button>
                  </div>`).join('')}
                </div>`:''}
              </div>`:''}
            </div>`;
          }).join('')+`
          <div style="margin-top:12px;padding-top:10px;border-top:1px dashed var(--border-strong)">
            <button class="btn btn-full" style="border-style:dashed;border-color:var(--green-dark);color:var(--green-dark);font-weight:600"
              onclick="newRecipeForTutor('${tutor.replace(/'/g,"\'")}');event.stopPropagation()">
              <i class="fas fa-plus"></i> Nova receita para ${tutor}
            </button>
          </div>
          </div>`:''}
        </div>`;
      });
    }
  }
  document.getElementById('content').innerHTML=html;
}

function setRecTab(t){state.recipeTab=t;state.recipeSearch='';state.openTutors={};state.openDogs={};renderReceitas();}

let _recSearchTimer=null;
function debounceRecSearch(val){
  state.recipeSearch=val;
  clearTimeout(_recSearchTimer);
  _recSearchTimer=setTimeout(()=>{
    const pos=document.getElementById('rec-search-input')?.selectionStart;
    renderReceitas();
    const el=document.getElementById('rec-search-input');
    if(el){el.focus();try{el.setSelectionRange(pos,pos);}catch(e){}}
  },50);
}

let _prodSearchTimer=null;
function debounceProdSearch(val){
  state.prodSearch=val;
  clearTimeout(_prodSearchTimer);
  _prodSearchTimer=setTimeout(()=>{
    const pos=document.getElementById('prod-search-input')?.selectionStart;
    renderProducao();
    const el=document.getElementById('prod-search-input');
    if(el){el.focus();try{el.setSelectionRange(pos,pos);}catch(e){}}
  },50);
}

function toggleTutor(tutor){
  if(!state.openTutors) state.openTutors={};
  state.openTutors[tutor]=!state.openTutors[tutor];
  renderReceitas();
}

function deleteTutor(tutor){
  const pets=state.db.recipes.filter(r=>r.type==='personalizada'&&r.tutor===tutor);
  openModal(`<div class="modal-title">Excluir pasta "${tutor}"?</div>
    <div style="background:var(--red-light);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--red);margin-bottom:16px">
      <i class="fas fa-exclamation-triangle"></i> Isso vai excluir <strong>todas as ${pets.length} receita${pets.length!==1?'s':''}</strong> de ${tutor} permanentemente. Esta ação não pode ser desfeita.
    </div>
    <div style="margin-bottom:16px;font-size:13px;color:var(--text-2)">
      ${pets.map(r=>`<div style="padding:4px 0;border-bottom:1px solid var(--border)">🐶 ${r.dog} — ${r.cat}</div>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-danger btn-full" onclick="confirmDeleteTutor('${tutor.replace(/'/g,"\\'")}')">
        <i class="fas fa-trash-alt"></i> Sim, excluir tudo
      </button>
      <button class="btn btn-full" onclick="closeModal()">Cancelar</button>
    </div>`);
}

function confirmDeleteTutor(tutor){
  state.db.recipes=state.db.recipes.filter(r=>!(r.type==='personalizada'&&r.tutor===tutor));
  saveData(); closeModal(); renderReceitas();
  toast(`🗑 Pasta "${tutor}" excluída`);
}
function toggleDog(tutor,dog){
  if(!state.openDogs) state.openDogs={};
  const k=tutor+'__'+dog;
  state.openDogs[k]=!state.openDogs[k];
  renderReceitas();
}

function newRecipeForTutor(tutor){
  newRecipe('personalizada');
  // pre-fill tutor after modal opens
  setTimeout(()=>{
    const el=document.getElementById('nr-tutor');
    if(el){ el.value=tutor; el.readOnly=true; el.style.background='var(--green-light)'; el.style.color='var(--green-dark)'; el.style.fontWeight='600'; }
  },50);
}
function viewVersion(recipeId, vIdx){
  const r=state.db.recipes.find(x=>x.id===recipeId); if(!r) return;
  const v=(r.versions||[])[vIdx]; if(!v) return;
  openModal(`<div class="modal-title">Versão anterior — ${r.dog} <button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div style="background:var(--amber-light);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--amber);margin-bottom:14px">
      <i class="fas fa-clock"></i> Salva em ${v.savedAt||'data desconhecida'} · ${v.ingredients.length} ingredientes · ${v.defQty||'?'} unid · ${v.temp||'?'}°C
    </div>
    <div style="margin-bottom:14px">
      ${v.pkts&&v.pktG?`<div style="font-size:12px;color:var(--green-dark);font-weight:600;margin-bottom:8px">📦 ${v.pkts} pacotes de ${v.pktG}g</div>`:''}
      ${v.ingredients.map(i=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span>${i.n}${i.raw?' 🥩 <span style="font-size:10px;color:var(--red)">CRU</span>':''}</span>
        <span style="font-weight:700">${i.q}g</span>
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-full" onclick="restoreVersion('${recipeId}',${vIdx})">
        <i class="fas fa-undo"></i> Restaurar
      </button>
      <button class="btn btn-danger btn-full" onclick="deleteVersion('${recipeId}',${vIdx})">
        <i class="fas fa-trash-alt"></i> Apagar versão
      </button>
    </div>`);
}

function deleteVersion(recipeId, vIdx){
  const r=state.db.recipes.find(x=>x.id===recipeId); if(!r) return;
  if(!confirm('Apagar esta versão anterior? Não é possível desfazer.')) return;
  r.versions.splice(vIdx,1);
  saveData(); closeModal(); renderReceitas();
  toast('🗑 Versão apagada');
}
function restoreVersion(recipeId, vIdx){
  const r=state.db.recipes.find(x=>x.id===recipeId); if(!r) return;
  const v=(r.versions||[])[vIdx]; if(!v) return;
  // save current as a new version before restoring
  const now=new Date().toLocaleDateString('pt-BR');
  if(!r.versions) r.versions=[];
  r.versions.push({savedAt:now,ingredients:[...r.ingredients],defQty:r.defQty,pkts:r.pkts,pktG:r.pktG,temp:r.temp,cat:r.cat});
  // restore
  Object.assign(r, {ingredients:v.ingredients,defQty:v.defQty,pkts:v.pkts,pktG:v.pktG,temp:v.temp,cat:v.cat});
  r.versions.splice(vIdx,1);
  saveData(); closeModal(); renderReceitas();
  toast('✅ Versão restaurada!');
}

function newRecipe(type){
  const isCom=type==='comercial'||type==='barf';
  openModal(`<div class="modal-title">Nova Receita <button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="field"><label>Nome</label><input type="text" id="nr-name" placeholder="${isCom?'Ex: Dieta Comercial Frango':'Ex: Flor'}"></div>
    ${isCom?`<div class="field"><label>Subtítulo</label><input type="text" id="nr-sub" placeholder="Ex: Risotto de Frango"></div>`
    :`<div class="row2"><div class="field"><label>Tutor/empresa</label><input type="text" id="nr-tutor"></div>
      <div class="field"><label>Cachorro</label><input type="text" id="nr-dog"></div></div>
      <div class="row2">
        <div class="field"><label>Nº pacotes/mês</label><input type="number" id="nr-pkts" value="30"></div>
        <div class="field"><label>Peso/pacote (g)</label><input type="number" id="nr-pktg" step="0.1"></div>
      </div>`}
    <div class="row2">
      <div class="field"><label>Categoria</label>
        <select id="nr-cat"><option>Frango</option><option>Boi</option><option>Pato</option><option>Peixe</option><option>Porco</option><option>Peru</option><option>Misto</option></select>
      </div>
      <div class="field"><label>Temp. °C</label><input type="number" id="nr-temp" value="${type==='barf'?'':85}"></div>
    </div>
    <div class="field"><label>${isCom?'Ingredientes por 1 kg':'Ingredientes por unidade'}</label></div>
    <div style="display:grid;grid-template-columns:2fr 75px ${type==='barf'?'95px ':''} 32px;gap:5px;margin-bottom:4px">
      <span style="font-size:11px;color:var(--text-2);font-weight:600">Ingrediente</span>
      <span style="font-size:11px;color:var(--text-2);font-weight:600">g</span>
      ${type==='barf'?'<span style="font-size:11px;color:var(--text-2);font-weight:600">Preparo</span>':''}
      <span></span>
    </div>
    <div id="nr-ings"></div>
    <button class="btn btn-sm" style="margin-bottom:14px;width:100%" onclick="addNrIng('${type}')"><i class="fas fa-plus"></i> Ingrediente</button>
    ${type==='personalizada'?`<div style="background:var(--amber-light);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--amber);margin-bottom:12px"><i class="fas fa-info-circle"></i> Todos os ingredientes são <strong>cozidos</strong> por padrão. Marque 🥩 Cru apenas para carnes em dieta crua.</div>`:''}
    <button class="btn btn-primary btn-full" onclick="saveNewRecipe('${type}')"><i class="fas fa-save"></i> Salvar Receita</button>`);
  for(let i=0;i<4;i++) addNrIng(type);
}

function addNrIng(type){
  const showRaw=type==='barf'||type==='personalizada';
  const d=document.createElement('div');
  d.className='ing-row';
  d.style.gridTemplateColumns=`2fr 75px ${showRaw?'95px ':''}32px`;
  d.innerHTML=`<input type="text" placeholder="Ingrediente">
    <input type="number" placeholder="g" min="0" step="0.1">
    ${showRaw?`<label style="display:flex;align-items:center;gap:4px;font-size:12px;white-space:nowrap;cursor:pointer"><input type="checkbox" style="width:auto"> 🥩 Cru</label>`:''}
    <button class="btn btn-icon btn-sm btn-danger" onclick="this.parentElement.remove()" style="padding:5px"><i class="fas fa-times"></i></button>`;
  document.getElementById('nr-ings').appendChild(d);
}

function saveNewRecipe(type){
  const name=document.getElementById('nr-name')?.value.trim();
  if(!name){toast('⚠️ Informe o nome');return;}
  const rows=document.querySelectorAll('#nr-ings .ing-row');
  const ingredients=[];
  rows.forEach(r=>{
    const inps=r.querySelectorAll('input[type=text],input[type=number]');
    const cb=r.querySelector('input[type=checkbox]');
    const n=inps[0].value.trim(),q=parseFloat(inps[1].value);
    if(n&&q>0) ingredients.push({n,q,raw:cb?cb.checked:false});
  });
  if(!ingredients.length){toast('⚠️ Adicione ingredientes');return;}
  const cat=document.getElementById('nr-cat').value;
  const temp=parseInt(document.getElementById('nr-temp')?.value)||null;
  let recipe;
  if(type==='comercial'||type==='barf'){
    recipe={id:uid(),type:'comercial',barf:type==='barf',name,subname:document.getElementById('nr-sub')?.value.trim()||'',cat,temp,ingredients};
  } else {
    const tutor=document.getElementById('nr-tutor')?.value.trim();
    const dog=document.getElementById('nr-dog')?.value.trim();
    if(!tutor||!dog){toast('⚠️ Informe tutor e cachorro');return;}
    recipe={id:uid(),type:'personalizada',tutor,dog,cat,temp,
      defQty:parseInt(document.getElementById('nr-pkts')?.value)||30,
      pkts:parseInt(document.getElementById('nr-pkts')?.value)||null,
      pktG:parseFloat(document.getElementById('nr-pktg')?.value)||null,
      ingredients};
  }
  state.db.recipes.push(recipe);
  saveData(); closeModal(); renderReceitas();
  toast('✅ Receita salva!');
}

function editRecipe(id){
  const r=state.db.recipes.find(x=>x.id===id); if(!r) return;
  const type=r.barf?'barf':r.type;
  const isCom=type==='comercial'||type==='barf';
  openModal(`<div class="modal-title">Editar Receita <button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="field"><label>Nome</label><input type="text" id="er-name" value="${r.name||''}"></div>
    ${isCom
      ?`<div class="field"><label>Subtítulo</label><input type="text" id="er-sub" value="${r.subname||''}"></div>`
      :`<div class="row2">
          <div class="field"><label>Tutor/empresa</label><input type="text" id="er-tutor" value="${r.tutor||''}"></div>
          <div class="field"><label>Cachorro</label><input type="text" id="er-dog" value="${r.dog||''}"></div>
        </div>
        <div class="row2">
          <div class="field"><label>Nº pacotes/mês</label><input type="number" id="er-pkts" value="${r.pkts||r.defQty||30}"></div>
          <div class="field"><label>Peso/pacote (g)</label><input type="number" id="er-pktg" step="0.1" value="${r.pktG||''}"></div>
        </div>`}
    <div class="row2">
      <div class="field"><label>Categoria</label>
        <select id="er-cat">${['Frango','Boi','Pato','Peixe','Porco','Peru','Misto'].map(c=>`<option ${r.cat===c?'selected':''}>${c}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Temp. °C</label><input type="number" id="er-temp" value="${r.temp||''}"></div>
    </div>
    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <label style="margin:0">${isCom?'Ingredientes por 1 kg':'Ingredientes por unidade'}</label>
      <button class="btn btn-sm" onclick="addErIng('${type}')"><i class="fas fa-plus"></i> Linha</button>
    </div>
    <div style="display:grid;grid-template-columns:2fr 75px ${type==='barf'?'95px ':''}32px;gap:5px;margin-bottom:6px">
      <span style="font-size:11px;color:var(--text-2);font-weight:600">Ingrediente</span>
      <span style="font-size:11px;color:var(--text-2);font-weight:600">g</span>
      ${type==='barf'?'<span style="font-size:11px;color:var(--text-2);font-weight:600">Preparo</span>':''}
      <span></span>
    </div>
    <div id="er-ings"></div>
    <button class="btn btn-primary btn-full" style="margin-top:14px" onclick="saveEditRecipe('${id}','${type}')">
      <i class="fas fa-save"></i> Salvar Alterações
    </button>`);
  setTimeout(()=>{ r.ingredients.forEach(ing=>addErIng(type,ing.n,ing.q,ing.raw||false)); },60);
}

function addErIng(type,name='',qty='',raw=false){
  const c=document.getElementById('er-ings'); if(!c) return;
  const showRaw=type==='barf'||type==='personalizada';
  const d=document.createElement('div'); d.className='ing-row';
  d.style.gridTemplateColumns=`2fr 75px ${showRaw?'95px ':''}32px`;
  d.innerHTML=`<input type="text" placeholder="Ingrediente" value="${name}">
    <input type="number" placeholder="g" min="0" step="0.1" value="${qty||''}">
    ${showRaw?`<label style="display:flex;align-items:center;gap:4px;font-size:12px;white-space:nowrap;cursor:pointer"><input type="checkbox" style="width:auto" ${raw?'checked':''}> 🥩 Cru</label>`:''}
    <button class="btn btn-icon btn-sm btn-danger" onclick="this.parentElement.remove()" style="padding:5px"><i class="fas fa-times"></i></button>`;
  c.appendChild(d);
}

function saveEditRecipe(id,type){
  const r=state.db.recipes.find(x=>x.id===id); if(!r) return;
  const name=document.getElementById('er-name')?.value.trim();
  if(!name){toast('⚠️ Informe o nome');return;}
  const rows=document.querySelectorAll('#er-ings .ing-row');
  const ingredients=[];
  rows.forEach(row=>{
    const inps=row.querySelectorAll('input[type=text],input[type=number]');
    const cb=row.querySelector('input[type=checkbox]');
    const n=inps[0].value.trim(),q=parseFloat(inps[1].value);
    if(n&&q>0) ingredients.push({n,q,raw:cb?cb.checked:false});
  });
  if(!ingredients.length){toast('⚠️ Adicione ao menos um ingrediente');return;}
  const cat=document.getElementById('er-cat').value;
  const temp=parseInt(document.getElementById('er-temp')?.value)||null;
  // archive current version
  const now=new Date().toLocaleDateString('pt-BR');
  if(!r.versions) r.versions=[];
  r.versions.push({savedAt:now,ingredients:JSON.parse(JSON.stringify(r.ingredients)),defQty:r.defQty,pkts:r.pkts,pktG:r.pktG,temp:r.temp,cat:r.cat});
  if(r.versions.length>10) r.versions=r.versions.slice(-10);
  if(type==='comercial'||type==='barf'){
    r.name=name; r.subname=document.getElementById('er-sub')?.value.trim()||r.subname||'';
    r.cat=cat; r.temp=temp; r.ingredients=ingredients;
  } else {
    const tutor=document.getElementById('er-tutor')?.value.trim();
    const dog=document.getElementById('er-dog')?.value.trim();
    if(!tutor||!dog){toast('⚠️ Informe tutor e cachorro');return;}
    r.tutor=tutor; r.dog=dog; r.cat=cat; r.temp=temp; r.ingredients=ingredients;
    r.pkts=parseInt(document.getElementById('er-pkts')?.value)||r.pkts||null;
    r.pktG=parseFloat(document.getElementById('er-pktg')?.value)||r.pktG||null;
    r.defQty=r.pkts||30;
  }
  saveData(); closeModal(); renderReceitas();
  toast('✅ Receita atualizada!');
}

function deleteRecipe(id){
  openModal(`<div class="modal-title">Excluir receita?</div>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:20px">Esta ação não pode ser desfeita.</p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-danger btn-full" onclick="confirmDelete('${id}')">Sim, excluir</button>
      <button class="btn btn-full" onclick="closeModal()">Cancelar</button>
    </div>`);
}
function confirmDelete(id){
  state.db.recipes=state.db.recipes.filter(r=>r.id!==id);
  saveData(); closeModal(); renderReceitas();
  toast('🗑 Receita excluída');
}

// ── HISTÓRICO ─────────────────────────────────────────────
function renderHistorico(){
  const history=state.db.history||[];
  let html=`<div class="card-title" style="margin-bottom:14px;font-family:'Coolvetica','DM Sans',sans-serif;font-size:18px">Histórico de Produções</div>`;
  if(!history.length){
    html+=`<div class="empty"><i class="fas fa-history"></i><p>Nenhuma produção registrada ainda.<br>Gere o primeiro relatório na aba Produção!</p></div>`;
  } else {
    html+=history.map(h=>`<div class="history-item">
      <div onclick="viewHistDetail('${h.id}')" style="flex:1;cursor:pointer">
        <div class="hi-date">${h.dateStr||h.date}</div>
        <div class="hi-meta">${(h.recipes||[]).slice(0,3).join(' · ')}${(h.recipes||[]).length>3?` +${h.recipes.length-3}`:''}</div>
      </div>
      <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <div class="hi-kg">${h.totalKg} kg</div>
        <div style="display:flex;gap:5px">
          <button class="btn btn-sm" style="font-size:11px;padding:3px 8px" onclick="editHistEntry('${h.id}')">
            <i class="fas fa-edit"></i> Editar
          </button>
          <button class="btn btn-sm btn-danger" style="font-size:11px;padding:3px 8px" onclick="deleteHistEntry('${h.id}')">
            <i class="fas fa-trash-alt"></i>
          </button>
        </div>
      </div>
    </div>`).join('');
  }
  document.getElementById('content').innerHTML=html;
}

function editHistEntry(id){
  const h=(state.db.history||[]).find(x=>x.id===id); if(!h) return;
  // carrega a seleção salva de volta para o estado de hoje
  state.today.selected = JSON.parse(JSON.stringify(h.selected||{}));
  // garante que cada seleção tem a receita atualizada do db
  Object.keys(state.today.selected).forEach(rid=>{
    const r=state.db.recipes.find(x=>x.id===rid);
    if(r) state.today.selected[rid].recipe=r;
    else delete state.today.selected[rid];
  });
  state.today.date = h.date;
  // remove do histórico para ser regravado ao gerar PDF
  state.db.history=state.db.history.filter(x=>x.id!==id);
  navigate('producao');
  toast('✏️ Produção carregada para edição — ajuste e gere o PDF novamente.',4000);
}

function deleteHistEntry(id){
  openModal(`<div class="modal-title">Excluir este registro?</div>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:20px">O registro do histórico será removido permanentemente.</p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-danger btn-full" onclick="confirmDeleteHist('${id}')">Sim, excluir</button>
      <button class="btn btn-full" onclick="closeModal()">Cancelar</button>
    </div>`);
}
function confirmDeleteHist(id){
  state.db.history=state.db.history.filter(x=>x.id!==id);
  saveData(); closeModal(); renderHistorico();
  toast('🗑 Registro excluído');
}

function viewHistDetail(id){
  const h=(state.db.history||[]).find(x=>x.id===id); if(!h) return;
  const mp=computeMP(h.selected||{});
  const totalMP=mp.reduce((a,x)=>a+x.total,0);
  openModal(`<div class="modal-title">${h.dateStr||h.date} <button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val">${(h.recipes||[]).length}</div><div class="stat-lbl">Receitas</div></div>
      <div class="stat-box"><div class="stat-val">${h.totalKg}</div><div class="stat-lbl">kg total</div></div>
      <div class="stat-box"><div class="stat-val">${mp.length}</div><div class="stat-lbl">Ingredientes</div></div>
    </div>
    <div class="section-label">Receitas produzidas</div>
    ${(h.recipes||[]).map(n=>`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;font-weight:600">${n}</div>`).join('')}
    <div class="section-label" style="margin-top:14px">Matéria-prima utilizada</div>
    ${mp.map(e=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span>${e.name}${e.raw?' 🥩':''}</span>
      <span style="font-weight:700;font-family:'DM Mono',monospace">${(e.total/1000).toFixed(3)} kg</span>
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;padding:10px 0;font-weight:700;font-size:14px;color:var(--green-dark);border-top:2px solid var(--green)">
      <span>TOTAL</span><span style="font-family:'DM Mono',monospace">${(totalMP/1000).toFixed(3)} kg</span>
    </div>`);
}

// ── INIT ──────────────────────────────────────────────────
const gotToken = checkAuthCallback();
if (gotToken) {
  loadData();
} else {
  const raw = localStorage.getItem('petnaturau-db');
  if (raw) {
    state.driveToken = 'local';
    document.getElementById('auth-btn').className = 'auth-btn connected';
    document.getElementById('auth-label').textContent = 'Local ✓';
    state.db = JSON.parse(raw);
    render();
  } else {
    render(); // mostra tela de boas-vindas
  }
}
</script>
</body>
</html>
